<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLOY MASTER | PT BKI EDGE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&display=swap');
        
        /* MENGHAPUS SEMUA JARAK DI TEPI LAYAR */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #000; 
            font-family: 'Public Sans', sans-serif; 
            overflow-x: hidden;
        }

        /* GAYA NEO-BRUTALISM FLAT (MENEMPEL KE PINGGIR) */
        .edge-box { 
            background: #fff; 
            border: 4px solid #000; 
        }
        
        .neo-btn { 
            background: #facc15; 
            border: 4px solid #000; 
            font-weight: 900; 
            transition: 0.1s;
        }
        .neo-btn:active { background: #fff; }

        .neo-input { 
            width: 100%; 
            padding: 20px; 
            border: 4px solid #000; 
            background: #fff; 
            font-weight: 900; 
            outline: none;
            border-radius: 0; /* Kotak tajam */
        }
        
        .hidden { display: none !important; }
        .overlay { background: #fff; z-index: 1000; }
        
        /* Scrollbar kustom agar tidak ada sisa hitam */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #facc15; border: 2px solid #000; }
    </style>
</head>
<body>

    <section id="login-page" class="fixed inset-0 z-[2000] bg-yellow-400 flex items-center justify-center">
        <div class="edge-box p-12 max-w-md w-full shadow-[15px_15px_0px_#000]">
            <h1 class="text-7xl font-black italic tracking-tighter mb-2 text-center">RLOY<span class="text-blue-600">.</span></h1>
            <p class="text-[10px] font-black uppercase tracking-[0.4em] mb-10 text-center">PT Bangga Karya Indonesia</p>
            <div class="space-y-4">
                <input type="text" id="u-in" placeholder="ADMIN ID" class="neo-input uppercase">
                <input type="password" id="p-in" placeholder="PASSWORD" class="neo-input">
                <button onclick="checkAuth()" class="neo-btn w-full py-5 text-2xl italic uppercase bg-black text-white">LOGIN MASTER →</button>
            </div>
        </div>
    </section>

    <section id="admin-page" class="hidden min-h-screen flex flex-col">
        <header class="w-full bg-white border-b-[8px] border-black p-6 flex justify-between items-center">
            <h2 class="text-4xl font-black italic tracking-tighter uppercase">BKI CONSOLE</h2>
            <button onclick="logout()" class="neo-btn bg-red-500 text-white px-8 py-3 uppercase italic">Logout</button>
        </header>

        <div class="flex flex-col lg:flex-row flex-1">
            <div class="lg:w-1/3 bg-blue-600 border-r-[8px] border-black p-8 text-white">
                <h3 class="font-black text-3xl mb-8 uppercase italic underline decoration-4">Deploy System</h3>
                <div class="space-y-6 text-black">
                    <input type="text" id="web-slug" placeholder="PROJECT SLUG" class="neo-input">
                    <textarea id="web-html" placeholder="PASTE HTML HERE..." class="neo-input h-[500px] font-mono text-xs"></textarea>
                    <button onclick="publish()" class="neo-btn w-full py-6 text-3xl uppercase italic bg-yellow-400">LAUNCH →</button>
                </div>
            </div>

            <div class="lg:w-2/3 bg-white p-8">
                <h3 class="font-black text-3xl mb-8 uppercase italic">Active Infrastructure</h3>
                <div id="master-list" class="grid grid-cols-1 md:grid-cols-2 gap-0 border-l-4 border-t-4 border-black">
                    </div>
            </div>
        </div>
    </section>

    <div id="detail-modal" class="fixed inset-0 overlay hidden flex flex-col">
        <div class="w-full bg-black text-white p-6 flex justify-between items-center">
            <h2 id="det-name" class="text-5xl font-black italic uppercase tracking-tighter">/SLUG</h2>
            <button onclick="closeDetail()" class="neo-btn bg-yellow-400 text-black px-10 py-3 text-xl uppercase">TUTUP [X]</button>
        </div>

        <div class="flex flex-col lg:flex-row flex-1 overflow-y-auto">
            <div class="lg:w-3/4 p-10 border-r-[8px] border-black flex flex-col">
                <div class="flex justify-between items-end mb-10">
                    <h3 class="text-3xl font-black uppercase italic">Traffic Growth Diagram</h3>
                    <div class="text-right">
                        <p class="font-black uppercase text-xs">Total Views</p>
                        <p id="det-views" class="text-8xl font-black italic leading-none">0</p>
                    </div>
                </div>
                <div class="flex-1 bg-gray-50 border-4 border-black">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <div class="lg:w-1/4 p-8 bg-gray-100 flex flex-col gap-6">
                <div class="flex-1">
                    <h4 class="font-black uppercase mb-2 italic text-sm">Update Content:</h4>
                    <textarea id="det-code" class="neo-input h-full min-h-[400px] text-xs font-mono bg-black text-green-400"></textarea>
                </div>
                <button onclick="saveEdit()" class="neo-btn bg-blue-600 text-white py-5 text-xl uppercase">Save Changes</button>
                <a id="det-link" target="_blank" class="neo-btn bg-black text-white text-center py-5 text-xl uppercase italic">Open Site</a>
            </div>
        </div>
    </div>

<script>
    const config = {
        apiKey: "AIzaSyCtkndqaHPx7PfbjJ2xbd3mda_cz3NwIpE",
        authDomain: "miningtransaction.firebaseapp.com",
        projectId: "miningtransaction",
        databaseURL: "https://miningtransaction-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "miningtransaction.firebasestorage.app",
        messagingSenderId: "839897955886",
        appId: "1:839897955886:web:78cdd18c9624496dda69bf"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    let chartInstance = null, currentEditSlug = "";

    const ADM = "admin", PAS = "2013GG";

    window.onload = () => {
        const h = window.location.hash.substring(1);
        if(h) return serve(h);
        if(localStorage.getItem('bki_session') === 'active') showDash();
    };

    function checkAuth() {
        if(document.getElementById('u-in').value === ADM && document.getElementById('p-in').value === PAS) {
            localStorage.setItem('bki_session', 'active'); showDash();
        } else { alert("ACCESS DENIED!"); }
    }

    function showDash() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('admin-page').classList.remove('hidden');
        loadData();
    }

    function publish() {
        const s = document.getElementById('web-slug').value.trim().toLowerCase().replace(/\s+/g, '-');
        const c = document.getElementById('web-html').value;
        if(!s || !c) return alert("DATA KOSONG!");
        db.ref('sites/' + s).set({ content: c, views: 0, time: new Date().toLocaleString() })
        .then(() => { alert("SUCCESS!"); location.reload(); });
    }

    function loadData() {
        db.ref('sites').on('value', snap => {
            const list = document.getElementById('master-list');
            list.innerHTML = "";
            snap.forEach(item => {
                const d = item.val();
                list.innerHTML += `
                    <div class="border-r-4 border-b-4 border-black p-10 hover:bg-yellow-400 cursor-pointer group transition-all" onclick="openDetail('${item.key}')">
                        <h4 class="font-black text-4xl italic uppercase tracking-tighter">/${item.key}</h4>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xs font-black uppercase italic group-hover:underline">Analytics →</span>
                            <span class="text-3xl font-black italic underline decoration-4 underline-offset-4">${d.views || 0}</span>
                        </div>
                    </div>`;
            });
        });
    }

    function openDetail(slug) {
        currentEditSlug = slug;
        db.ref('sites/' + slug).once('value', s => {
            const d = s.val();
            document.getElementById('det-name').innerText = "/" + slug;
            document.getElementById('det-views').innerText = d.views || 0;
            document.getElementById('det-code').value = d.content;
            document.getElementById('det-link').href = "#" + slug;
            document.getElementById('detail-modal').classList.remove('hidden');
            setTimeout(() => renderChart(d.views || 0), 100);
        });
    }

    function renderChart(views) {
        const ctx = document.getElementById('trafficChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['START', 'PROGRESS', 'PEAK', 'NOW'],
                datasets: [{
                    label: 'TRAFFIC',
                    data: [views*0, views*0.3, views*0.6, views],
                    borderColor: '#000',
                    borderWidth: 12,
                    backgroundColor: 'rgba(250, 204, 21, 0.8)',
                    fill: true,
                    tension: 0,
                    pointRadius: 0
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#000', lineWidth: 2 } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function saveEdit() {
        db.ref('sites/' + currentEditSlug).update({ content: document.getElementById('det-code').value }).then(() => alert("UPDATED!"));
    }

    function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }

    function serve(h) {
        db.ref('sites/'+h).once('value', s => {
            if(s.exists()) {
                db.ref('sites/'+h+'/views').transaction(v => (v || 0) + 1);
                document.open(); document.write(s.val().content); document.close();
            } else { location.hash = ""; location.reload(); }
        });
    }
</script>
</body>
</html>
