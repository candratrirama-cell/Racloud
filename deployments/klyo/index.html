<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow - Analytics & Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 30px 30px; }
        .neo-card { background: white; border: 4px solid #1a1a1a; box-shadow: 10px 10px 0px #1a1a1a; }
        .btn-green { background: #22c55e; border: 4px solid #1a1a1a; box-shadow: 5px 5px 0px #1a1a1a; font-weight: 800; transition: 0.2s; }
        .btn-green:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #1a1a1a; }
        .btn-green:disabled { background: #d1d5db; opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="neo-card p-10 w-full max-w-md animate__animated animate__jackInTheBox">
            <h1 class="text-5xl font-black text-center mb-8 italic">SLOW<span class="text-green-500">.</span></h1>
            <input type="text" id="username" placeholder="Username" class="w-full p-4 border-4 border-black rounded-none font-bold mb-3 outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 border-4 border-black rounded-none font-bold mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full btn-green py-4 text-xl uppercase italic">Login</button>
        </div>
    </div>

    <div id="deploy-section" class="hidden max-w-[90%] mx-auto py-12 animate__animated animate__fadeIn">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic">SLOW/DASHBOARD</h1>
            <div class="flex gap-4 items-center">
                <div class="neo-card px-4 py-1 bg-yellow-400 font-black text-sm">PROJ: <span id="count-text">0</span>/5</div>
                <button onclick="location.reload()" class="font-black text-red-500">LOGOUT</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="neo-card p-6">
                    <h3 class="font-black mb-4 uppercase text-green-600 underline italic">Deploy / Update</h3>
                    <input type="text" id="project-name" placeholder="slug-name" class="w-full p-3 border-4 border-black mb-4 font-bold outline-none">
                    <button id="btn-deploy" onclick="handleDeploy()" class="w-full btn-green py-3">PUSH CODE!</button>
                </div>
                <div id="my-projects-list" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-6 space-y-6">
                <div class="neo-card overflow-hidden">
                    <div class="bg-black text-white p-3 font-mono text-[10px] flex justify-between">
                        <span>EDITOR.HTML</span>
                        <span id="edit-indicator" class="hidden text-yellow-400 animate-pulse">EDIT MODE</span>
                    </div>
                    <textarea id="project-code" spellcheck="false" class="w-full h-[400px] p-6 font-mono text-xs outline-none" placeholder="Ketik kode di sini..."></textarea>
                </div>
                
                <div class="neo-card p-6 h-[300px]">
                    <h3 class="font-black text-xs uppercase mb-4">Traffic Pengunjung (Realtime)</h3>
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="neo-card p-6 h-full bg-zinc-50 border-red-500">
                    <h3 class="font-black text-red-600 mb-4 flex items-center gap-2 italic underline">
                        ⚠️ ERROR LOGS
                    </h3>
                    <div id="error-list" class="space-y-3 font-mono text-[10px] overflow-y-auto max-h-[700px]">
                        <p class="text-gray-400">Pilih project untuk melihat error...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, remove, runTransaction, onValue, push } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa1YQqXXUn3ssriyyhl6mYHo47-rOcnmg",
            databaseURL: "https://tools-ab6a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tools-ab6a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myChart;

        // --- AUTH ---
        window.handleAuth = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const snap = await get(ref(db, 'users/' + user));
            if (snap.exists() && snap.val().password !== pass) return alert("Sandi Salah!");
            if (!snap.exists()) await set(ref(db, 'users/' + user), { password: pass });
            localStorage.setItem('slow_user', user);
            showDashboard(user);
        };

        function showDashboard(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('deploy-section').classList.remove('hidden');
            loadStats(user);
            initChart();
        }

        // --- CHART LOGIC ---
        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Views', data: [], borderColor: '#22c55e', tension: 0.4, fill: true, backgroundColor: 'rgba(34, 197, 94, 0.1)' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        // --- LOAD PROJECTS & LOGS ---
        async function loadStats(user) {
            onValue(ref(db, 'deploys'), (snap) => {
                const listDiv = document.getElementById('my-projects-list');
                listDiv.innerHTML = '';
                let count = 0;
                let chartLabels = [];
                let chartData = [];

                if (snap.exists()) {
                    Object.entries(snap.val()).forEach(([name, data]) => {
                        if(data.author === user) {
                            count++;
                            chartLabels.push(name);
                            chartData.push(data.views || 0);
                            listDiv.innerHTML += `
                            <div class="neo-card p-4 mb-4">
                                <p class="font-black italic">/${name}</p>
                                <div class="flex gap-2 mt-3">
                                    <button onclick="editProject('${name}')" class="text-[9px] border-2 border-black px-2 py-1 font-bold">EDIT</button>
                                    <button onclick="showLogs('${name}')" class="text-[9px] border-2 border-black px-2 py-1 bg-yellow-400 font-bold">LOGS</button>
                                    <a href="#${name}" target="_blank" class="text-[9px] bg-black text-white px-2 py-1">LIVE</a>
                                </div>
                            </div>`;
                        }
                    });
                    myChart.data.labels = chartLabels;
                    myChart.data.datasets[0].data = chartData;
                    myChart.update();
                }
                document.getElementById('count-text').innerText = count;
            });
        }

        window.showLogs = (name) => {
            const logRef = ref(db, `logs/${name}`);
            onValue(logRef, (snap) => {
                const logDiv = document.getElementById('error-list');
                logDiv.innerHTML = `<p class="text-blue-500 mb-2">Logs for /${name}:</p>`;
                if (snap.exists()) {
                    Object.values(snap.val()).reverse().forEach(log => {
                        logDiv.innerHTML += `<div class="p-2 border-b border-red-200 text-red-500">
                            [${new Date(log.time).toLocaleTimeString()}] ${log.msg}
                        </div>`;
                    });
                } else { logDiv.innerHTML += "<p>No errors found! Great job.</p>"; }
            });
        };

        window.handleDeploy = async () => {
            const name = document.getElementById('project-name').value.trim().toLowerCase();
            const code = document.getElementById('project-code').value;
            const user = localStorage.getItem('slow_user');
            if(!name || !code) return alert("Wajib diisi!");
            await update(ref(db, 'deploys/' + name), { code, author: user });
            alert("Success!");
            location.reload();
        };

        window.editProject = async (name) => {
            const snap = await get(ref(db, 'deploys/' + name));
            document.getElementById('project-name').value = name;
            document.getElementById('project-name').disabled = true;
            document.getElementById('project-code').value = snap.val().code;
            document.getElementById('edit-indicator').classList.remove('hidden');
        };

        // --- VIEW ENGINE + ERROR TRACKER ---
        async function checkRoute() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const snap = await get(ref(db, 'deploys/' + hash));
                if (snap.exists()) {
                    // Update views
                    runTransaction(ref(db, 'deploys/' + hash), (p) => { if(p) p.views = (p.views || 0) + 1; return p; });
                    
                    // Injecting Error Tracker script into user's code
                    const errorTrackerScript = `
                    <script>
                        window.onerror = function(msg, url, line) {
                            fetch("${firebaseConfig.databaseURL}/logs/${hash}.json", {
                                method: 'POST',
                                body: JSON.stringify({ msg: msg, time: Date.now() })
                            });
                        };
                    <\/script>`;
                    
                    const finalCode = errorTrackerScript + snap.val().code;
                    document.body.innerHTML = `<iframe srcdoc="${finalCode.replace(/"/g, '&quot;')}" style="width:100vw;height:100vh;border:none;"></iframe>`;
                }
            }
        }
        window.onload = checkRoute;
    </script>
</body>
</html>
