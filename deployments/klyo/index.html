<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay Admin - GoR 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; }
        .btn-admin { background: #00D166; transition: 0.2s; }
        .btn-admin:active { transform: scale(0.98); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tight">Cloudpay Admin Panel</h1>
                <p class="text-sm text-slate-500">Monitoring User & Pengiriman Hadiah</p>
            </div>
            <div class="flex items-center gap-3 bg-white p-2 rounded-2xl border border-slate-200">
                <div id="admin-pic" class="w-10 h-10 rounded-full bg-slate-100 bg-cover bg-center border-2 border-[#00D166]"></div>
                <div class="pr-4">
                    <p id="admin-name" class="text-xs font-bold">Checking Admin...</p>
                    <p class="text-[10px] text-[#00D166] font-bold tracking-widest uppercase">Authorized</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="card p-6 overflow-hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-extrabold text-slate-800">Daftar Peserta Event</h3>
                        <span class="bg-green-50 text-[#00D166] text-[10px] font-black px-3 py-1 rounded-full border border-green-100">REALTIME</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-50">
                                    <th class="pb-4">Rank</th>
                                    <th class="pb-4">User</th>
                                    <th class="pb-4">WhatsApp / Dana</th>
                                    <th class="pb-4">XP</th>
                                    <th class="pb-4">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body" class="text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="card p-6 flex flex-col h-[600px]">
                    <h3 class="font-extrabold text-slate-800 mb-4">Live Chat Control</h3>
                    <div id="admin-chat-box" class="flex-grow overflow-y-auto space-y-4 mb-4 pr-2 text-xs">
                        </div>
                    <div class="space-y-2 pt-4 border-t border-slate-50">
                        <input id="admin-chat-input" type="text" placeholder="Kirim pesan sebagai Admin..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#00D166]">
                        <button onclick="sendAdminChat()" class="w-full btn-admin text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-green-100">Kirim Ke Obrolan</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, query, orderByChild, limitToLast, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1OHn2utYY881b504XEgMAwmhrglqtinQ",
            authDomain: "sedabase.firebaseapp.com",
            databaseURL: "https://sedabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sedabase",
            appId: "1:921144451877:web:f37ec5e4de4ff4fc4870cc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('admin-name').innerText = user.displayName;
                document.getElementById('admin-pic').style.backgroundImage = `url(${user.photoURL})`;
                loadAdminData();
                loadAdminChat();
            } else {
                signInWithPopup(auth, provider);
            }
        });

        function loadAdminData() {
            // Ambil user dan urutkan berdasarkan XP
            const userRef = query(ref(db, 'users'), orderByChild('xp'));
            onValue(userRef, (snap) => {
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = "";
                const users = [];
                snap.forEach(s => { users.push(s.val()); });
                users.sort((a,b) => (b.xp || 0) - (a.xp || 0));

                users.forEach((u, i) => {
                    const statusEvent = u.eventJoined ? `<span class="text-green-500 font-bold">${u.wa || '-'}</span>` : `<span class="text-slate-300 italic text-[10px]">Belum Join</span>`;
                    
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4 font-black text-slate-300 text-xs">#${i+1}</td>
                            <td class="py-4">
                                <div class="flex items-center gap-2">
                                    <img src="${u.photo}" class="w-7 h-7 rounded-full">
                                    <p class="font-bold text-slate-700">${u.name}</p>
                                </div>
                            </td>
                            <td class="py-4 font-mono text-xs">${statusEvent}</td>
                            <td class="py-4 font-black text-[#00D166]">${u.xp || 0}</td>
                            <td class="py-4">
                                <button onclick="window.open('https://wa.me/${u.wa}')" class="text-[10px] bg-slate-100 px-3 py-1 rounded-lg font-bold hover:bg-slate-200 transition">HUBUNGI</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function loadAdminChat() {
            onValue(ref(db, 'chat'), (snap) => {
                const box = document.getElementById('admin-chat-box');
                box.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    const isAdmin = d.name === "ADMIN";
                    box.innerHTML += `
                        <div class="flex flex-col ${isAdmin ? 'items-end' : 'items-start'}">
                            <span class="font-black text-[9px] text-slate-400 mb-1 uppercase tracking-tighter">${d.name}</span>
                            <div class="${isAdmin ? 'bg-[#00D166] text-white' : 'bg-slate-100 text-slate-700'} p-3 rounded-2xl max-w-[90%] border border-slate-50">
                                ${d.msg}
                            </div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendAdminChat = () => {
            const inp = document.getElementById('admin-chat-input');
            if(inp.value.trim() !== "") {
                push(ref(db, 'chat'), {
                    name: "ADMIN",
                    msg: inp.value,
                    time: serverTimestamp(),
                    system: false
                });
                inp.value = "";
            }
        };
    </script>
</body>
</html>
