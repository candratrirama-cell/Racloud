<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 w-full max-w-md text-center">
        <h3 class="font-black text-slate-800 text-xl uppercase italic mb-8">Masuk Akun</h3>
        <button id="btn-google" class="w-full py-4 border-2 border-slate-100 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa-apple/1x/google.png" class="w-5">
            Google Account
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        if(!sessionStorage.getItem('temp_sid')) window.location.replace('index.html');

        document.getElementById('btn-google').onclick = async () => {
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
                const finalSid = "SESS-" + Math.random().toString(36).substring(2, 15);
                sessionStorage.setItem('ra_session_status', finalSid);
                window.location.href = `dashboard.html?sid=${finalSid}`;
            } catch (e) { alert("Gagal Login"); }
        };
    </script>
</body>
</html>
