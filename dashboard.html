<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Dashboard</title>
    <script>
        (function(){
            const urlToken = new URLSearchParams(window.location.search).get('sid');
            const storedToken = sessionStorage.getItem('ra_active_token');
            if (!urlToken || urlToken !== storedToken) {
                sessionStorage.clear(); window.location.replace('index.html');
            }
            window.onbeforeunload = () => { sessionStorage.removeItem('ra_access_granted'); };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #global-lock { display: none; position: fixed; inset: 0; background: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body class="pb-24">

    <div id="global-lock">
        <div id="lock-icon" class="w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg"></div>
        <h1 id="lock-title" class="text-2xl font-black text-slate-900 mb-2 uppercase italic"></h1>
        <p id="lock-desc" class="text-slate-500 max-w-xs mb-8 font-medium"></p>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="bg-sky-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-sky-200">Hubungi Admin</a>
    </div>

    <div id="app-body">
        <header class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
            <div class="font-black text-sky-600 text-xl tracking-tighter italic uppercase">RaCloud</div>
            <div class="flex gap-3">
                <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center border border-green-100 shadow-sm"><i class="fab fa-whatsapp"></i></a>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center border border-red-100 shadow-sm"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="max-w-md mx-auto p-6">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-sky-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 relative z-10">Saldo Aktif</p>
                <h3 class="text-4xl font-black text-slate-900 italic tracking-tighter relative z-10">Rp<span id="balance">0</span></h3>
                <div class="mt-6 flex items-center gap-2 relative z-10">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <p id="user-display-name" class="text-[10px] font-black text-slate-500 uppercase tracking-widest"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchTab('tab-depo')" class="glass p-6 rounded-[35px] text-center shadow-sm hover:bg-white transition-all group">
                    <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition-transform"><i class="fas fa-qrcode"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Merchant QRIS</p>
                </button>
                <button onclick="switchTab('tab-wd')" class="glass p-6 rounded-[35px] text-center shadow-sm hover:bg-white transition-all group">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition-transform"><i class="fas fa-wallet"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Withdraw DANA</p>
                </button>
            </div>

            <div id="tab-depo" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <div class="bg-slate-50 p-2 rounded-3xl mb-6">
                    <canvas id="qris-canvas" class="w-full rounded-2xl shadow-sm"></canvas>
                </div>
                
                <a href="https://i.ibb.co.com/bRJWY5KL/Tak-berjudul34-20260413183523.jpg" target="_blank" class="block w-full py-4 mb-6 bg-orange-50 border border-orange-100 text-orange-600 rounded-2xl text-[9px] font-black text-center uppercase tracking-wider italic">
                    <i class="fas fa-info-circle mr-1"></i> Lihat Contoh Bukti Transaksi
                </a>

                <div class="space-y-4">
                    <input type="number" id="d-amt" placeholder="Masukkan Nominal Saldo" class="w-full p-5 rounded-2xl bg-white outline-none font-bold text-slate-800 border border-slate-100 text-center focus:ring-2 ring-sky-100 transition-all">
                    
                    <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-slate-100 text-center group cursor-pointer hover:border-sky-300 transition-colors">
                        <label for="d-file" class="cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-slate-300 text-2xl mb-2 group-hover:text-sky-500 transition-colors"></i>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Upload Bukti Transfer</p>
                            <input type="file" id="d-file" accept="image/*" class="hidden">
                        </label>
                    </div>
                    
                    <button id="d-btn" onclick="handleDepo()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-black shadow-lg shadow-sky-100 uppercase text-xs tracking-widest active:scale-95 transition-all">Konfirmasi Deposit</button>
                </div>
            </div>

            <div id="tab-wd" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <div class="space-y-4">
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">ID</span>
                        <input type="text" id="w-phone" placeholder="Nomor DANA" class="w-full p-5 pl-12 rounded-2xl bg-white border border-slate-100 text-center font-bold text-slate-800 focus:ring-2 ring-blue-100 transition-all">
                    </div>
                    <input type="number" id="w-amt" placeholder="Nominal Penarikan" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold text-slate-800 focus:ring-2 ring-blue-100 transition-all">
                    
                    <button id="w-btn" onclick="handleWD()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all disabled:bg-slate-200 disabled:text-slate-400">Tarik Saldo</button>
                </div>
                <p id="w-msg" class="text-[10px] text-red-500 font-bold text-center mt-6 hidden italic">
                    <i class="fas fa-clock mr-1"></i> Menunggu penarikan sebelumnya selesai...
                </p>
            </div>

            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-50">
                <div class="flex justify-between items-center mb-8 px-2">
                    <h4 class="font-black text-slate-800 uppercase text-[11px] italic tracking-widest">Aktivitas Terbaru</h4>
                    <i class="fas fa-history text-slate-200"></i>
                </div>
                <div id="h-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            
            <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="mt-8 flex items-center justify-center gap-3 w-full py-5 bg-green-500 text-white rounded-[30px] font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-green-100 hover:bg-green-600 transition-all">
                <i class="fab fa-whatsapp text-lg"></i> Gabung Grup Komunitas
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0;
        let isPendingWD = false;

        onAuthStateChanged(auth, u => {
            if(!u) window.location.replace('index.html');
            else {
                onValue(ref(db, `users/${u.uid}/banned`), snap => {
                    if(snap.val() === true) lock("AKUN TERKUNCI", "Terdeteksi aktivitas mencurigakan.", "fas fa-user-lock", "bg-red-500 text-white");
                    else {
                        document.getElementById('user-display-name').innerText = u.displayName;
                        drawMerchantQRIS(u.displayName); 
                        sync(u.uid);
                    }
                });
            }
        });

        onValue(ref(db, 'system_status'), snap => {
            const st = snap.val() || 'open';
            if(st !== 'open') lock("SERVER MAINTENANCE", "Kami akan segera kembali.", "fas fa-tools", "bg-amber-100 text-amber-600");
            else { document.getElementById('global-lock').style.display = 'none'; document.getElementById('app-body').style.display = 'block'; }
        });

        function lock(t, d, i, c) {
            const gl = document.getElementById('global-lock');
            gl.style.display = 'flex'; document.getElementById('app-body').style.display = 'none';
            document.getElementById('lock-icon').className = `w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg ${c}`;
            document.getElementById('lock-icon').innerHTML = `<i class="${i}"></i>`;
            document.getElementById('lock-title').innerText = t; document.getElementById('lock-desc').innerText = d;
        }

        window.logout = () => signOut(auth);
        window.switchTab = (id) => {
            const el = document.getElementById(id);
            const wasActive = el.classList.contains('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if(!wasActive) el.classList.add('active');
        };

        function drawMerchantQRIS(userName) {
            const cv = document.getElementById('qris-canvas'), cx = cv.getContext('2d');
            const im = new Image(); im.crossOrigin = "anonymous";
            im.src = "https://i.ibb.co.com/7d4MhQtf/Tak-berjudul34-20260413183523.jpg"; 

            im.onload = () => { 
                cv.width = im.width; cv.height = im.height; 
                cx.drawImage(im, 0, 0); 
                cx.fillStyle = "#334155";
                cx.font = "bold 60px 'Plus Jakarta Sans', sans-serif";
                cx.textAlign = "center";
                cx.fillText(userName.toUpperCase(), cv.width / 2, 315); 
            };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                isPendingWD = false;
                let arr = []; 
                snap.forEach(c => { 
                    const d = c.val();
                    if(d.uid === uid) {
                        arr.push(d);
                        if(d.type === 'wd' && d.status === 'pending') isPendingWD = true;
                    }
                });

                document.getElementById('w-btn').disabled = isPendingWD;
                document.getElementById('w-msg').classList.toggle('hidden', !isPendingWD);

                arr.reverse().forEach(d => {
                    const statusColor = d.status === 'success' ? 'text-green-500' : (d.status === 'failed' ? 'text-red-500' : 'text-amber-500');
                    const typeIcon = d.type === 'depo' ? 'fa-arrow-down' : 'fa-paper-plane';
                    let proofBtn = d.type==='depo' ? `<a href="${d.proof}" target="_blank" class="mt-4 block py-2 bg-slate-50 text-slate-400 rounded-xl text-[8px] font-black text-center uppercase border border-slate-100 hover:bg-sky-50 hover:text-sky-500 transition-colors">Lihat Bukti</a>` : '';
                    
                    list.insertAdjacentHTML('beforeend', `
                        <div class="p-5 bg-white rounded-[30px] border border-slate-50 shadow-sm flex flex-col">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-[10px] text-slate-400"><i class="fas ${typeIcon}"></i></div>
                                    <div><p class="text-[9px] font-black uppercase italic text-slate-400">${d.type}</p></div>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-slate-800 text-sm">Rp${d.amount.toLocaleString()}</p>
                                    <p class="text-[8px] font-black uppercase ${statusColor}">${d.status}</p>
                                </div>
                            </div>
                            ${proofBtn}
                        </div>
                    `);
                });
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Pilih nominal dan lampirkan bukti transfer!");
            const rd = new FileReader(); rd.readAsDataURL(fl);
            rd.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: rd.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Berhasil! Laporan sedang diverifikasi admin."); window.location.reload();
            };
        };

        window.handleWD = async () => {
            if(isPendingWD) return alert("Masih ada penarikan yang diproses!");
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(!amt || amt < 1000 || amt > uBal || !ph) return alert("Periksa nominal dan nomor DANA kamu!");
            await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("Penarikan berhasil diajukan!"); window.location.reload();
        };
    </script>
</body>
</html>
