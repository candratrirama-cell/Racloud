<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f9ff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .bg-sky-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #global-lock { display: none; position: fixed; inset: 0; background: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body class="pb-20">

    <div id="global-lock">
        <div id="lock-icon" class="w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg"></div>
        <h1 id="lock-title" class="text-3xl font-black text-slate-900 mb-2 uppercase italic"></h1>
        <p id="lock-desc" class="text-slate-500 max-w-xs mb-8 font-medium"></p>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="bg-sky-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl shadow-sky-100">Hubungi Admin</a>
    </div>

    <div id="app-body">
        <header class="p-6 flex justify-between items-center bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-white shadow-sm">
            <div class="font-black text-sky-600 text-xl tracking-tighter italic">RA CLOUD</div>
            <div class="flex gap-3">
                <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center shadow-sm border border-green-100"><i class="fab fa-whatsapp"></i></a>
                <button onclick="logoutAllDevices()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center shadow-sm border border-red-100"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="max-w-md mx-auto p-6">
            <div class="bg-sky-gradient p-8 rounded-[35px] text-white shadow-2xl shadow-sky-200 mb-8 relative overflow-hidden border border-sky-400">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                <p class="text-sky-100 text-[10px] font-bold uppercase tracking-[0.3em] mb-2 opacity-80">Available Balance</p>
                <h3 class="text-5xl font-extrabold tracking-tighter italic">Rp<span id="balance">0</span></h3>
                <div class="mt-6 flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <p id="user-display-name" class="text-[10px] font-bold uppercase tracking-widest opacity-90"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchTab('tab-depo')" class="glass p-6 rounded-[30px] text-center active:scale-95 transition-all border border-white shadow-sm">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-plus"></i></div>
                    <p class="text-[10px] font-black text-slate-600 uppercase italic">Isi Saldo</p>
                </button>
                <button onclick="switchTab('tab-wd')" class="glass p-6 rounded-[30px] text-center active:scale-95 transition-all border border-white shadow-sm">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-paper-plane"></i></div>
                    <p class="text-[10px] font-black text-slate-600 uppercase italic">Withdraw</p>
                </button>
            </div>

            <div id="tab-depo" class="tab-content glass p-6 rounded-[35px] mb-8 border border-white shadow-sm">
                <canvas id="qris-canvas" class="w-full rounded-2xl mb-4 shadow-sm border-2 border-sky-50"></canvas>
                
                <a href="https://i.ibb.co.com/bRJWY5KL/Tak-berjudul34-20260413183523.jpg" target="_blank" class="block w-full py-4 mb-4 bg-orange-50 border border-orange-200 text-orange-600 rounded-2xl text-[10px] font-black text-center uppercase tracking-tighter italic shadow-sm active:scale-95 transition-all">
                    <i class="fas fa-image mr-1"></i> Lihat Contoh Bukti Transaksi Wajib
                </a>

                <input type="number" id="d-amt" placeholder="Masukkan Nominal" class="w-full p-4 rounded-2xl bg-slate-50 mb-3 outline-none font-bold text-sky-700 border border-slate-100 text-center">
                
                <div class="bg-white p-5 rounded-2xl border-2 border-dashed border-sky-100 text-center mb-5">
                    <p class="text-[10px] font-black text-sky-400 mb-3 italic uppercase">Upload Bukti Transfer</p>
                    <input type="file" id="d-file" accept="image/*" class="text-[10px] text-slate-400 w-full">
                </div>
                
                <button id="d-btn" onclick="handleDepo()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-bold shadow-lg shadow-sky-100 active:scale-95 transition-all uppercase text-xs tracking-widest">Kirim Laporan</button>
            </div>

            <div id="tab-wd" class="tab-content glass p-6 rounded-[35px] mb-8 border border-white shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="font-black text-slate-800 italic uppercase text-sm">Withdraw DANA</h4>
                    <span class="text-[9px] bg-sky-100 text-sky-600 px-3 py-1 rounded-full font-black uppercase">Fee 1.5%</span>
                </div>
                <input type="text" id="w-phone" placeholder="Nomor DANA (08...)" class="w-full p-4 rounded-2xl bg-slate-50 mb-3 outline-none font-bold border border-slate-100 text-center">
                <input type="number" id="w-amt" placeholder="Nominal Penarikan" class="w-full p-4 rounded-2xl bg-slate-50 mb-5 outline-none font-bold border border-slate-100 text-center">
                <button id="w-btn" onclick="handleWD()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all uppercase text-xs tracking-widest">Proses WD</button>
                <p id="w-msg" class="text-[10px] text-red-500 font-bold text-center mt-4 hidden italic animate-pulse">HARAP TUNGGU, TRANSAKSI PENDING...</p>
            </div>

            <div class="glass p-6 rounded-[35px] border border-white shadow-sm">
                <h4 class="font-black text-slate-800 mb-6 flex items-center gap-2 uppercase text-xs italic tracking-widest"><i class="fas fa-history text-sky-400"></i> Riwayat Aktivitas</h4>
                <div id="h-list" class="space-y-4 max-h-[450px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.app/database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // KEAMANAN: Cek apakah user melewati index.html
        if (sessionStorage.getItem('ra_access_granted') !== 'true') {
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0, uWait = false;
        let currentSessionId = localStorage.getItem('ra_sid') || Math.random().toString(36).substring(7);

        // UI NAVIGATION
        window.switchTab = (id) => {
            const el = document.getElementById(id);
            const active = el.classList.contains('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if(!active) el.classList.add('active');
        };

        // AUTH & DATABASE SYNC
        onAuthStateChanged(auth, u => {
            if(u) {
                onValue(ref(db, `users/${u.uid}/banned`), snap => {
                    if(snap.val() === true) {
                        lockScreen("AKUN TERKUNCI", "Akun Anda ditangguhkan karena pelanggaran kebijakan.", "fas fa-user-slash", "bg-red-600");
                    } else {
                        localStorage.setItem('ra_sid', currentSessionId);
                        document.getElementById('user-display-name').innerText = u.displayName;
                        initSession(u.uid);
                        drawQ(u.displayName);
                        sync(u.uid);
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        // SYSTEM STATUS CHECK
        onValue(ref(db, 'system_status'), (snap) => {
            const st = snap.val() || 'open';
            if(st === 'close') {
                lockScreen("SERVER OFFLINE", "Layanan sedang dimatikan sementara oleh admin.", "fas fa-power-off", "bg-red-100 text-red-600");
            } else if(st === 'maintenance') {
                lockScreen("MAINTENANCE", "Sistem sedang diperbarui untuk stabilitas cloud.", "fas fa-tools", "bg-orange-100 text-orange-600");
            } else {
                document.getElementById('global-lock').style.display = 'none';
                document.getElementById('app-body').style.display = 'block';
            }
        });

        function lockScreen(title, desc, iconClass, colorClass) {
            const lock = document.getElementById('global-lock');
            const body = document.getElementById('app-body');
            lock.style.display = 'flex'; body.style.display = 'none';
            document.getElementById('lock-icon').className = `w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg ${colorClass}`;
            document.getElementById('lock-icon').innerHTML = `<i class="${iconClass}"></i>`;
            document.getElementById('lock-title').innerText = title;
            document.getElementById('lock-desc').innerText = desc;
        }

        function initSession(uid) {
            const sRef = ref(db, `users/${uid}/sessions/${currentSessionId}`);
            update(sRef, { lastActive: serverTimestamp() });
            onValue(ref(db, `users/${uid}/sessions`), s => {
                if(!s.hasChild(currentSessionId)) { signOut(auth); window.location.reload(); }
            });
        }

        window.logoutAllDevices = async () => {
            if(!confirm("Keluarkan akun dari semua perangkat?")) return;
            await remove(ref(db, `users/${auth.currentUser.uid}/sessions`));
            await signOut(auth);
        }

        function drawQ(n) {
            const cv = document.getElementById('qris-canvas'), cx = cv.getContext('2d');
            const im = new Image(); im.crossOrigin = "anonymous";
            im.src = "https://i.ibb.co.com/39M4CcTD/1776079336915-1.jpg";
            im.onload = () => { cv.width = im.width; cv.height = im.height; cx.drawImage(im,0,0); cx.font="bold 45px sans-serif"; cx.textAlign="center"; cx.fillText(n.toUpperCase(), cv.width/2, 160); };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = ""; uWait = false;
                let arr = [];
                snap.forEach(c => {
                    const d = c.val(); if(d.uid === uid) { arr.push(d); if(d.type==='wd' && d.status==='pending') uWait = true; }
                });
                arr.reverse().forEach(d => {
                    let btnBukti = d.type === 'depo' ? `<a href="${d.proof}" target="_blank" class="mt-4 block w-full py-2 bg-sky-100 text-sky-600 rounded-xl text-[9px] font-black text-center uppercase border border-sky-200 shadow-sm">Lihat Bukti Terkirim</a>` : '';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="p-5 bg-white rounded-[25px] border border-slate-100 shadow-sm mb-3">
                            <div class="flex justify-between items-center">
                                <div><p class="text-[10px] font-black text-slate-800 uppercase italic tracking-widest">${d.type}</p><p class="text-[8px] text-slate-300 font-bold mt-1">${new Date(d.time).toLocaleString()}</p></div>
                                <div class="text-right"><p class="font-black text-sm ${d.status==='success'?'text-green-500':'text-orange-400'}">Rp${d.amount.toLocaleString()}</p><p class="text-[8px] font-black text-slate-300 uppercase tracking-widest mt-1">${d.status}</p></div>
                            </div>
                            ${btnBukti}
                        </div>`);
                });
                document.getElementById('w-btn').disabled = uWait;
                document.getElementById('w-msg').classList.toggle('hidden', !uWait);
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Nominal dan File Bukti Transfer wajib diisi!");
            const btn = document.getElementById('d-btn'); btn.disabled = true; btn.innerText = "MENGIRIM...";
            const reader = new FileReader(); reader.readAsDataURL(fl);
            reader.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: reader.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Laporan deposit berhasil dikirim!"); window.location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(!amt || amt < 1000 || amt > uBal || !ph) return alert("Saldo tidak cukup atau data belum lengkap!");
            await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("Permintaan penarikan dana sedang diproses!"); window.location.reload();
        };
    </script>
</body>
</html>
