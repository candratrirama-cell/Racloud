<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div id="app-body">
        <header class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
            <div class="font-black text-sky-600 text-xl tracking-tighter italic uppercase">RaCloud</div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center border border-red-100"><i class="fas fa-power-off"></i></button>
        </header>

        <div class="max-w-md mx-auto p-6">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 mb-8">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Saldo Aktif</p>
                <h3 class="text-4xl font-black text-slate-900 italic tracking-tighter">Rp<span id="balance">0</span></h3>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchTab('tab-depo')" class="glass p-6 rounded-[35px] text-center shadow-sm">
                    <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-qrcode"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Merchant QRIS</p>
                </button>
                <button onclick="switchTab('tab-wd')" class="glass p-6 rounded-[35px] text-center shadow-sm">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-wallet"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Withdraw DANA</p>
                </button>
            </div>

            <div id="tab-depo" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <div id="merchant-setup" class="hidden text-center py-6">
                    <input type="text" id="m-name-input" placeholder="Nama Toko" class="w-full p-4 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-4 outline-none uppercase">
                    <button onclick="setupMerchant()" class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs">Cetak QRIS Berhias</button>
                </div>

                <div id="merchant-active" class="hidden">
                    <div class="bg-white p-2 rounded-3xl mb-6 shadow-inner border border-slate-50 overflow-hidden">
                        <canvas id="qris-canvas" class="w-full rounded-2xl"></canvas>
                    </div>
                    <input type="number" id="d-amt" placeholder="Nominal Isi Saldo" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-3">
                    <input type="file" id="d-file" accept="image/*" class="w-full mb-4">
                    <button onclick="handleDepo()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs">Konfirmasi</button>
                </div>
            </div>

            <div id="tab-wd" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <input type="text" id="w-phone" placeholder="Nomor DANA" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-3">
                <input type="number" id="w-amt" placeholder="Nominal" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-5">
                <button id="w-btn" onclick="handleWD()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Tarik Saldo</button>
            </div>

            <div id="h-list" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let userUid = null;

        onAuthStateChanged(auth, u => {
            if(!u) window.location.replace('index.html');
            else {
                userUid = u.uid;
                sync(u.uid);
                checkMerchant(u.uid);
            }
        });

        async function checkMerchant(uid) {
            const snap = await get(ref(db, `users/${uid}/merchant_name`));
            if(snap.exists()) {
                document.getElementById('merchant-active').classList.remove('hidden');
                drawGPNQRIS(snap.val());
            } else {
                document.getElementById('merchant-setup').classList.remove('hidden');
            }
        }

        window.setupMerchant = async () => {
            const mName = document.getElementById('m-name-input').value.trim();
            if(!mName) return alert("Isi nama toko!");
            await set(ref(db, `users/${userUid}/merchant_name`), mName);
            
            // NOTIF BOT DASHBOARD
            const botToken = "8786682343:AAFJ_OR9__rrJdUKRLbQ6uTrRrNfcrGuOAU";
            const msg = `🏪 *MERCHANT DICETAK*\n\n👤 User: ${auth.currentUser.displayName}\n🏪 Toko: ${mName}\n🆔 ID: ${userUid}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: "8362148317", text: msg, parse_mode: "Markdown" })
            });
            window.location.reload();
        };

        function drawGPNQRIS(mName) {
            const cv = document.getElementById('qris-canvas'), cx = cv.getContext('2d');
            const bg = new Image(); 
            bg.crossOrigin = "anonymous";
            // Menggunakan gambar hiasan dari foto yang kamu kirim
            bg.src = "https://i.ibb.co.com/1000101921/hiasan-qris.jpg"; 

            bg.onload = () => {
                cv.width = bg.width; cv.height = bg.height;
                cx.drawImage(bg, 0, 0);

                // Menggambar Nama Toko di atas (Ganti Tulisan "NAMA")
                cx.fillStyle = "#334155";
                cx.font = "bold 55px 'Plus Jakarta Sans'";
                cx.textAlign = "center";
                cx.fillText(mName.toUpperCase(), cv.width / 2, 185);

                // Menggambar NMID tetap (Bisa diubah sesuai data dinamis jika perlu)
                cx.font = "400 32px 'Plus Jakarta Sans'";
                cx.fillText("NMID: ID102000882008519349", cv.width / 2, 255);
                
                // Note: Kode QR utama sudah menyatu di gambar backgroundmu. 
                // Jika ingin dinamis, diperlukan library QR-Gen tambahan di sini.
            };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { document.getElementById('balance').innerText = (s.val() || 0).toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    if(d.uid === uid) {
                        list.insertAdjacentHTML('afterbegin', `<div class="p-4 bg-white rounded-2xl mb-2 border border-slate-100 flex justify-between"><span>${d.type.toUpperCase()}</span><b>Rp${d.amount.toLocaleString()}</b></div>`);
                    }
                });
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Lengkapi data!");
            const rd = new FileReader(); rd.readAsDataURL(fl);
            rd.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: rd.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Berhasil!"); window.location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("Berhasil!"); window.location.reload();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.logout = () => signOut(auth);
    </script>
</body>
</html>
