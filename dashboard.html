<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div id="global-lock" class="hidden fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <div id="lock-icon" class="text-6xl mb-4"></div>
        <h1 id="lock-title" class="text-2xl font-bold text-slate-900 mb-2 uppercase"></h1>
        <p id="lock-desc" class="text-slate-500 mb-8 text-sm max-w-xs"></p>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="bg-sky-600 text-white px-10 py-3 rounded-xl font-bold">Admin</a>
    </div>

    <div id="page-setup" class="hidden fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center text-2xl mb-4"><i class="fas fa-store"></i></div>
        <h2 class="text-xl font-bold mb-2 uppercase">Nama Merchant</h2>
        <p class="text-slate-400 text-xs mb-6">Tentukan nama toko yang akan muncul di QRIS.</p>
        <input type="text" id="setup-merchant-name" placeholder="CONTOH: RAMA STORE" class="w-full max-w-xs p-4 bg-slate-100 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-sky-500 text-center font-bold uppercase">
        <button onclick="saveMerchantName()" class="w-full max-w-xs bg-sky-600 text-white py-4 rounded-xl font-bold active:scale-95 transition">SIMPAN</button>
    </div>

    <div id="app-body">
        <div id="page-landing" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="text-sky-600 text-6xl mb-4"><i class="fas fa-cloud"></i></div>
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tighter">RaCloud</h1>
            <p class="text-slate-400 mb-10 text-sm font-medium">Digital Asset Management Ecosystem</p>
            <button onclick="showPage('page-login')" class="w-full max-w-xs bg-sky-600 text-white py-4 rounded-xl font-bold shadow-xl active:scale-95 transition">Mulai Sekarang</button>
        </div>

        <div id="page-login" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-50">
            <div class="card p-8 rounded-3xl w-full max-w-md text-center shadow-sm">
                <h2 class="text-2xl font-bold mb-8 uppercase tracking-widest text-slate-800">Login User</h2>
                <button id="btn-login-google" class="w-full py-4 border-2 border-slate-100 rounded-xl flex items-center justify-center gap-3 font-bold text-slate-600 active:bg-slate-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Account
                </button>
                <button onclick="showPage('page-landing')" class="mt-8 text-slate-400 text-xs font-bold uppercase tracking-widest">Kembali</button>
            </div>
        </div>

        <div id="page-dashboard" class="hidden min-h-screen pb-10">
            <header class="p-5 flex justify-between items-center bg-white border-b sticky top-0 z-50">
                <div class="font-bold text-sky-600 italic tracking-tighter text-lg uppercase">RA CLOUD</div>
                <button onclick="logoutAllDevices()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
            </header>

            <div class="max-w-md mx-auto p-4">
                <div class="bg-sky-600 p-8 rounded-[32px] text-white shadow-lg mb-6 relative overflow-hidden">
                    <p class="text-[10px] uppercase tracking-[0.2em] opacity-70 mb-1 font-bold">Saldo Aktif</p>
                    <h3 class="text-4xl font-bold italic tracking-tighter">Rp<span id="balance">0</span></h3>
                    <div class="mt-6 flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <p id="user-display-name" class="text-[10px] font-bold uppercase tracking-widest opacity-90"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="switchTab('tab-depo')" class="card p-5 rounded-3xl text-center active:bg-slate-50 transition">
                        <i class="fas fa-plus-circle text-sky-500 text-xl mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-tighter">Top Up</p>
                    </button>
                    <button onclick="switchTab('tab-wd')" class="card p-5 rounded-3xl text-center active:bg-slate-50 transition">
                        <i class="fas fa-paper-plane text-sky-500 text-xl mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-tighter">Withdraw</p>
                    </button>
                </div>

                <div id="tab-depo" class="tab-content card p-5 rounded-[32px] mb-6 shadow-sm border-white">
                    <div class="relative w-full bg-slate-900 rounded-2xl overflow-hidden mb-4 border">
                        <div id="qris-header" class="bg-blue-800 text-white text-center py-2 text-[11px] font-bold uppercase tracking-widest"></div>
                        <img src="https://i.ibb.co.com/7d4MhQtf/1776079336915-1.jpg" class="w-full">
                    </div>
                    
                    <a href="https://i.ibb.co.com/bRJWY5KL/Tak-berjudul34-20260413183523.jpg" target="_blank" class="block w-full py-3 mb-4 bg-orange-50 border border-orange-100 text-orange-600 rounded-xl text-[10px] font-bold text-center uppercase italic">
                        <i class="fas fa-info-circle mr-1"></i> Lihat Contoh Bukti Wajib
                    </a>

                    <input type="number" id="d-amt" placeholder="Nominal Isi Saldo" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none border text-center font-bold text-sky-700">
                    <input type="file" id="d-file" accept="image/*" class="w-full text-[10px] text-slate-400 mb-4 ml-1">
                    <button id="d-btn" onclick="handleDepo()" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold uppercase text-xs tracking-widest shadow-md">Kirim Laporan</button>
                </div>

                <div id="tab-wd" class="tab-content card p-5 rounded-[32px] mb-6 shadow-sm border-white">
                    <div class="flex justify-between items-center mb-4 px-1">
                        <h4 class="font-bold text-slate-800 text-[10px] uppercase italic">DANA Withdrawal</h4>
                        <span class="text-[9px] bg-sky-100 text-sky-600 px-2 py-0.5 rounded font-black uppercase">Fee 1.5%</span>
                    </div>
                    <input type="text" id="w-phone" placeholder="No HP DANA (08...)" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none border text-center font-bold">
                    <input type="number" id="w-amt" placeholder="Nominal Penarikan" class="w-full p-4 bg-slate-50 rounded-xl mb-5 outline-none border text-center font-bold">
                    <button id="w-btn" onclick="handleWD()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs tracking-widest">Konfirmasi WD</button>
                    <p id="w-msg" class="text-[9px] text-red-500 font-bold mt-4 hidden text-center italic animate-pulse tracking-tight">TRANSAKSI SEDANG PENDING, HARAP TUNGGU</p>
                </div>

                <div class="card p-6 rounded-[32px] shadow-sm border-white">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-5 tracking-[0.2em] italic">Aktivitas Terakhir</p>
                    <div id="h-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, serverTimestamp, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0, currentSessionId = localStorage.getItem('ra_sid') || Math.random().toString(36).substring(7);

        // NAVIGATION
        window.showPage = (id) => {
            document.querySelectorAll('#app-body > div').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.switchTab = (id) => {
            const el = document.getElementById(id);
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if(!isActive) el.classList.add('active');
        };

        // REMOTE SYSTEM STATUS
        onValue(ref(db, 'system_status'), (snap) => {
            const st = snap.val() || 'open';
            const lock = document.getElementById('global-lock');
            const body = document.getElementById('app-body');
            if(st === 'open') { lock.classList.add('hidden'); body.classList.remove('hidden'); } 
            else {
                lock.classList.remove('hidden'); body.classList.add('hidden');
                document.getElementById('lock-icon').innerHTML = st === 'close' ? '🚫' : '⚙️';
                document.getElementById('lock-title').innerText = st === 'close' ? 'Server Off' : 'Maintenance';
                document.getElementById('lock-desc').innerText = st === 'close' ? 'Akses dimatikan sementara oleh admin.' : 'Sedang dalam perbaikan sistem.';
            }
        });

        // AUTH & DATABASE SYNC
        document.getElementById('btn-login-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async u => {
            if(u) {
                onValue(ref(db, `users/${u.uid}`), snap => {
                    const data = snap.val();
                    if(data?.banned) {
                        document.getElementById('global-lock').classList.remove('hidden');
                        document.getElementById('app-body').classList.add('hidden');
                        document.getElementById('lock-icon').innerText = '🔒';
                        document.getElementById('lock-title').innerText = 'BANNED';
                        document.getElementById('lock-desc').innerText = 'Akun anda diblokir permanen.';
                    } else if(!data?.merchantName) {
                        document.getElementById('app-body').classList.add('hidden');
                        document.getElementById('page-setup').classList.remove('hidden');
                    } else {
                        localStorage.setItem('ra_sid', currentSessionId);
                        document.getElementById('page-setup').classList.add('hidden');
                        document.getElementById('app-body').classList.remove('hidden');
                        document.getElementById('user-display-name').innerText = data.merchantName;
                        document.getElementById('qris-header').innerText = data.merchantName;
                        showPage('page-dashboard');
                        sync(u.uid);
                    }
                });
            } else { showPage('page-landing'); }
        });

        window.saveMerchantName = async () => {
            const name = document.getElementById('setup-merchant-name').value.toUpperCase();
            if(name.length < 3) return alert("Min. 3 Huruf!");
            await update(ref(db, `users/${auth.currentUser.uid}`), { merchantName: name, balance: 0, lastActive: serverTimestamp() });
        };

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                let arr = [], isWait = false;
                snap.forEach(c => { 
                    const d = c.val();
                    if(d.uid === uid) {
                        arr.push(d);
                        if(d.type === 'wd' && d.status === 'pending') isWait = true;
                    }
                });
                arr.reverse().slice(0, 15).forEach(d => {
                    const color = d.status === 'success' ? 'text-green-500' : 'text-orange-400';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="p-4 bg-slate-50 rounded-2xl border border-white flex justify-between items-center text-[10px]">
                            <div><p class="font-bold uppercase text-slate-700 italic">${d.type}</p><p class="text-slate-300 font-bold">${new Date(d.time).toLocaleTimeString()}</p></div>
                            <div class="text-right"><p class="font-bold ${color} text-xs">Rp${d.amount.toLocaleString()}</p><p class="text-slate-300 uppercase font-black tracking-tighter">${d.status}</p></div>
                        </div>`);
                });
                document.getElementById('w-btn').disabled = isWait;
                document.getElementById('w-msg').classList.toggle('hidden', !isWait);
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Wajib isi nominal & lampirkan bukti!");
            const btn = document.getElementById('d-btn'); btn.disabled = true; btn.innerText = "MENGIRIM...";
            const reader = new FileReader(); reader.readAsDataURL(fl);
            reader.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, amount: parseInt(amt), proof: reader.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Laporan depo berhasil dikirim!"); location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(amt < 1000 || amt > uBal || !ph) return alert("Saldo tidak cukup atau data salah!");
            await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("Permintaan penarikan dikirim!"); location.reload();
        };

        window.logoutAllDevices = async () => {
            if(confirm("Logout dari semua sesi?")) {
                await remove(ref(db, `users/${auth.currentUser.uid}/sessions`));
                await signOut(auth); location.reload();
            }
        };
    </script>
</body>
</html>
