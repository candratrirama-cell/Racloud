<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div id="global-lock" class="hidden fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <div id="lock-icon" class="text-5xl mb-4"></div>
        <h1 id="lock-title" class="text-2xl font-bold text-slate-900 mb-2 uppercase"></h1>
        <p id="lock-desc" class="text-slate-500 mb-8 text-sm"></p>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="bg-sky-600 text-white px-8 py-3 rounded-xl font-bold">Admin</a>
    </div>

    <div id="page-setup" class="hidden fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center p-6">
        <h2 class="text-xl font-bold mb-6">SETUP NAMA MERCHANT</h2>
        <input type="text" id="setup-merchant-name" placeholder="NAMA TOKO ANDA" class="w-full max-w-xs p-4 bg-slate-100 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-sky-500 text-center font-bold uppercase">
        <button onclick="saveMerchantName()" class="w-full max-w-xs bg-sky-600 text-white py-4 rounded-xl font-bold">SIMPAN</button>
    </div>

    <div id="app-body">
        <div id="page-landing" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
            <div class="text-sky-600 text-5xl mb-6"><i class="fas fa-cloud"></i></div>
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">RaCloud</h1>
            <p class="text-slate-500 mb-10 text-sm">Digital Ecosystem Lite Version</p>
            <button onclick="showPage('page-login')" class="w-full max-w-xs bg-sky-600 text-white py-4 rounded-xl font-bold shadow-lg">Mulai</button>
        </div>

        <div id="page-login" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="card p-8 rounded-3xl w-full max-w-md text-center">
                <h2 class="text-2xl font-bold mb-8">LOGIN</h2>
                <button id="btn-login-google" class="w-full py-4 border-2 border-slate-100 rounded-xl flex items-center justify-center gap-3 font-bold text-slate-600 active:bg-slate-50">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Account
                </button>
                <button onclick="showPage('page-landing')" class="mt-6 text-slate-400 text-xs font-bold uppercase">Kembali</button>
            </div>
        </div>

        <div id="page-dashboard" class="hidden min-h-screen pb-10">
            <header class="p-5 flex justify-between items-center bg-white border-b sticky top-0 z-50">
                <div class="font-bold text-sky-600 italic">RA CLOUD</div>
                <button onclick="logoutAllDevices()" class="text-red-500 font-bold text-sm"><i class="fas fa-sign-out-alt"></i></button>
            </header>

            <div class="max-w-md mx-auto p-4">
                <div class="bg-sky-600 p-6 rounded-3xl text-white shadow-lg mb-6">
                    <p class="text-[10px] uppercase tracking-widest opacity-80 mb-1">Saldo Tersedia</p>
                    <h3 class="text-3xl font-bold italic">Rp<span id="balance">0</span></h3>
                    <p id="user-display-name" class="mt-4 text-[10px] font-bold uppercase opacity-90 tracking-tighter"></p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="switchTab('tab-depo')" class="card p-4 rounded-2xl text-center active:bg-slate-50">
                        <i class="fas fa-plus-circle text-sky-500 mb-1"></i>
                        <p class="text-[10px] font-bold text-slate-600 uppercase">Top Up</p>
                    </button>
                    <button onclick="switchTab('tab-wd')" class="card p-4 rounded-2xl text-center active:bg-slate-50">
                        <i class="fas fa-paper-plane text-sky-500 mb-1"></i>
                        <p class="text-[10px] font-bold text-slate-600 uppercase">Withdraw</p>
                    </button>
                </div>

                <div id="tab-depo" class="tab-content card p-5 rounded-3xl mb-6">
                    <div class="relative w-full bg-slate-100 rounded-xl overflow-hidden mb-4 border">
                        <div id="qris-header" class="bg-blue-900 text-white text-center py-2 text-sm font-bold uppercase"></div>
                        <img src="https://i.ibb.co.com/7d4MhQtf/1776079336915-1.jpg" class="w-full">
                    </div>
                    <input type="number" id="d-amt" placeholder="Nominal" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none border text-center font-bold">
                    <input type="file" id="d-file" accept="image/*" class="w-full text-xs text-slate-400 mb-4">
                    <button id="d-btn" onclick="handleDepo()" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold uppercase text-xs">Kirim Bukti</button>
                </div>

                <div id="tab-wd" class="tab-content card p-5 rounded-3xl mb-6">
                    <input type="text" id="w-phone" placeholder="No DANA" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none border text-center font-bold">
                    <input type="number" id="w-amt" placeholder="Nominal" class="w-full p-4 bg-slate-50 rounded-xl mb-4 outline-none border text-center font-bold">
                    <button id="w-btn" onclick="handleWD()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs">Tarik Saldo</button>
                    <p id="w-msg" class="text-[10px] text-red-500 font-bold mt-4 hidden text-center italic">Harap tunggu transaksi pending...</p>
                </div>

                <div class="card p-5 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Aktivitas Terbaru</p>
                    <div id="h-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, serverTimestamp, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0, currentSessionId = localStorage.getItem('ra_sid') || Math.random().toString(36).substring(7);

        window.showPage = (id) => {
            document.querySelectorAll('#app-body > div').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.switchTab = (id) => {
            const el = document.getElementById(id);
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if(!isActive) el.classList.add('active');
        };

        // REMOTE SYSTEM CONTROL
        onValue(ref(db, 'system_status'), (snap) => {
            const st = snap.val() || 'open';
            const lock = document.getElementById('global-lock');
            const body = document.getElementById('app-body');
            if(st === 'open') { lock.classList.add('hidden'); body.classList.remove('hidden'); } 
            else {
                lock.classList.remove('hidden'); body.classList.add('hidden');
                document.getElementById('lock-icon').innerHTML = st === 'close' ? '❌' : '⚙️';
                document.getElementById('lock-title').innerText = st === 'close' ? 'Server Offline' : 'Maintenance';
            }
        });

        // AUTH & SYNC
        document.getElementById('btn-login-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async u => {
            if(u) {
                const userRef = ref(db, `users/${u.uid}`);
                onValue(userRef, snap => {
                    const data = snap.val();
                    if(data?.banned) {
                        document.getElementById('global-lock').classList.remove('hidden');
                        document.getElementById('app-body').classList.add('hidden');
                        document.getElementById('lock-icon').innerText = '🚫';
                        document.getElementById('lock-title').innerText = 'BANNED';
                        document.getElementById('lock-desc').innerText = 'Akun diblokir oleh admin.';
                    } else if(!data?.merchantName) {
                        document.getElementById('app-body').classList.add('hidden');
                        document.getElementById('page-setup').classList.remove('hidden');
                    } else {
                        localStorage.setItem('ra_sid', currentSessionId);
                        document.getElementById('page-setup').classList.add('hidden');
                        document.getElementById('app-body').classList.remove('hidden');
                        document.getElementById('user-display-name').innerText = data.merchantName;
                        document.getElementById('qris-header').innerText = data.merchantName;
                        showPage('page-dashboard');
                        sync(u.uid);
                    }
                });
            } else { showPage('page-landing'); }
        });

        window.saveMerchantName = async () => {
            const name = document.getElementById('setup-merchant-name').value.toUpperCase();
            if(name.length < 3) return alert("Minimal 3 huruf");
            await update(ref(db, `users/${auth.currentUser.uid}`), { merchantName: name, balance: 0 });
        };

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                let arr = [];
                snap.forEach(c => { if(c.val().uid === uid) arr.push(c.val()); });
                arr.reverse().slice(0, 10).forEach(d => {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="p-3 bg-slate-50 rounded-xl border border-white flex justify-between items-center text-[10px]">
                            <div><p class="font-bold uppercase text-slate-700">${d.type}</p><p class="text-slate-400">${new Date(d.time).toLocaleTimeString()}</p></div>
                            <div class="text-right"><p class="font-bold text-sky-600">Rp${d.amount.toLocaleString()}</p><p class="text-slate-300 uppercase">${d.status}</p></div>
                        </div>`);
                });
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Isi nominal & file!");
            const btn = document.getElementById('d-btn'); btn.disabled = true; btn.innerText = "...";
            const reader = new FileReader(); reader.readAsDataURL(fl);
            reader.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, amount: parseInt(amt), proof: reader.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Terkirim!"); location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(amt < 1000 || amt > uBal || !ph) return alert("Saldo kurang/data salah");
            await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("Sedang diproses!"); location.reload();
        };

        window.logoutAllDevices = () => { if(confirm("Keluar?")) { signOut(auth); location.reload(); }};
    </script>
</body>
</html>
