<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Dashboard</title>
    <script>
        (function(){
            const urlToken = new URLSearchParams(window.location.search).get('sid');
            const storedToken = sessionStorage.getItem('ra_active_token');
            if (!urlToken || urlToken !== storedToken) {
                sessionStorage.clear(); window.location.replace('index.html');
            }
            window.onbeforeunload = () => { sessionStorage.removeItem('ra_access_granted'); };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f9ff; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #global-lock { display: none; position: fixed; inset: 0; background: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body class="pb-20">

    <div id="global-lock">
        <div id="lock-icon" class="w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg"></div>
        <h1 id="lock-title" class="text-3xl font-black text-slate-900 mb-2 uppercase italic"></h1>
        <p id="lock-desc" class="text-slate-500 max-w-xs mb-8 font-medium"></p>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="bg-sky-600 text-white px-10 py-4 rounded-2xl font-bold">Hubungi Admin</a>
    </div>

    <div id="app-body">
        <header class="p-6 flex justify-between items-center bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-white">
            <div class="font-black text-sky-600 text-xl tracking-tighter italic uppercase">RaCloud</div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center border border-red-100"><i class="fas fa-power-off"></i></button>
        </header>

        <div class="max-w-md mx-auto p-6">
            <div class="bg-gradient-to-br from-sky-500 to-blue-700 p-8 rounded-[35px] text-white shadow-2xl mb-8 relative border border-sky-400">
                <p class="text-sky-100 text-[10px] font-bold uppercase tracking-[0.3em] mb-2">Available Balance</p>
                <h3 class="text-5xl font-extrabold italic tracking-tighter">Rp<span id="balance">0</span></h3>
                <p id="user-display-name" class="mt-4 text-[10px] font-bold uppercase tracking-widest opacity-90"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchTab('tab-depo')" class="glass p-6 rounded-[30px] text-center border border-white">
                    <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-qrcode"></i></div>
                    <p class="text-[10px] font-black text-slate-600 uppercase italic">Merchant QRIS</p>
                </button>
                <button onclick="switchTab('tab-wd')" class="glass p-6 rounded-[30px] text-center border border-white">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-paper-plane"></i></div>
                    <p class="text-[10px] font-black text-slate-600 uppercase italic">Withdraw</p>
                </button>
            </div>

            <div id="tab-depo" class="tab-content glass p-6 rounded-[35px] mb-8 border border-white">
                <div class="relative bg-white rounded-3xl p-4 shadow-inner border-4 border-sky-100 mb-4">
                    <canvas id="qris-canvas" class="w-full rounded-xl"></canvas>
                </div>
                
                <a href="https://i.ibb.co.com/bRJWY5KL/Tak-berjudul34-20260413183523.jpg" target="_blank" class="block w-full py-4 mb-4 bg-orange-50 border border-orange-200 text-orange-600 rounded-2xl text-[10px] font-black text-center uppercase italic">
                    <i class="fas fa-image mr-1"></i> Contoh Bukti Transaksi Wajib
                </a>
                <input type="number" id="d-amt" placeholder="Nominal Isi Saldo" class="w-full p-4 rounded-2xl bg-white mb-3 outline-none font-bold text-sky-700 border border-slate-100 text-center">
                <div class="bg-white p-5 rounded-2xl border-2 border-dashed border-sky-100 text-center mb-5">
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Upload Bukti Transfer</p>
                    <input type="file" id="d-file" accept="image/*" class="text-[10px] text-slate-400 w-full">
                </div>
                <button id="d-btn" onclick="handleDepo()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-bold shadow-lg uppercase text-xs">Kirim Laporan</button>
            </div>

            <div id="tab-wd" class="tab-content glass p-6 rounded-[35px] mb-8 border border-white">
                <input type="text" id="w-phone" placeholder="Nomor DANA" class="w-full p-4 rounded-2xl bg-white mb-3 border border-slate-100 text-center font-bold">
                <input type="number" id="w-amt" placeholder="Nominal Penarikan" class="w-full p-4 rounded-2xl bg-white mb-5 border border-slate-100 text-center font-bold">
                <button id="w-btn" onclick="handleWD()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold uppercase text-xs disabled:bg-slate-300">Proses WD</button>
                <p id="w-msg" class="text-[10px] text-red-500 font-bold text-center mt-4 hidden italic animate-pulse">Selesaikan penarikan sebelumnya dulu.</p>
            </div>

            <div class="glass p-6 rounded-[35px] border border-white">
                <h4 class="font-black text-slate-800 mb-6 uppercase text-xs italic tracking-widest">Riwayat Aktivitas</h4>
                <div id="h-list" class="space-y-4 max-h-[450px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0;
        let isPendingWD = false;

        onAuthStateChanged(auth, u => {
            if(!u) window.location.replace('index.html');
            else {
                onValue(ref(db, `users/${u.uid}/banned`), snap => {
                    if(snap.val() === true) lock("AKUN TERKUNCI", "Pelanggaran kebijakan.", "fas fa-user-slash", "bg-red-600 text-white");
                    else {
                        document.getElementById('user-display-name').innerText = u.displayName;
                        drawMerchantQRIS(u.displayName); 
                        sync(u.uid);
                    }
                });
            }
        });

        onValue(ref(db, 'system_status'), snap => {
            const st = snap.val() || 'open';
            if(st !== 'open') lock(st.toUpperCase(), "Server offline.", "fas fa-power-off", "bg-red-100 text-red-600");
            else { document.getElementById('global-lock').style.display = 'none'; document.getElementById('app-body').style.display = 'block'; }
        });

        function lock(t, d, i, c) {
            document.getElementById('global-lock').style.display = 'flex'; document.getElementById('app-body').style.display = 'none';
            document.getElementById('lock-icon').className = `w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-lg ${c}`;
            document.getElementById('lock-icon').innerHTML = `<i class="${i}"></i>`;
            document.getElementById('lock-title').innerText = t; document.getElementById('lock-desc').innerText = d;
        }

        window.logout = () => signOut(auth);
        window.switchTab = (id) => {
            const el = document.getElementById(id);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        // FUNGSI MENGGAMBAR QRIS DENGAN HIASAN NAMA GOOGLE USER
        function drawMerchantQRIS(userName) {
            const cv = document.getElementById('qris-canvas'), cx = cv.getContext('2d');
            const im = new Image(); im.crossOrigin = "anonymous";
            im.src = "https://i.ibb.co.com/7d4MhQtf/Tak-berjudul34-20260413183523.jpg"; 

            im.onload = () => { 
                cv.width = im.width; cv.height = im.height; 
                
                // 1. Gambar Background QRIS
                cx.drawImage(im, 0, 0); 
                
                // 2. Tambahkan Overlay Hiasan Atas (Nama User)
                cx.fillStyle = "white";
                cx.fillRect(0, 0, cv.width, 220); // Background Header Putih

                cx.fillStyle = "#0369a1"; // Warna Sky-700
                cx.font = "900 65px 'Plus Jakarta Sans', sans-serif";
                cx.textAlign = "center";
                
                // Teks Nama Sesuai Akun Google
                const displayTitle = userName.toUpperCase();
                cx.fillText(displayTitle, cv.width / 2, 120); 

                // Sub-teks Merchant
                cx.fillStyle = "#94a3b8"; 
                cx.font = "bold 30px sans-serif";
                cx.fillText("GOOGLE MERCHANT ID", cv.width / 2, 180);

                // 3. Tambahkan Border Estetik di sekeliling canvas
                cx.strokeStyle = "#e0f2fe";
                cx.lineWidth = 20;
                cx.strokeRect(0, 0, cv.width, cv.height);
            };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                isPendingWD = false;
                let arr = []; 
                snap.forEach(c => { 
                    const d = c.val();
                    if(d.uid === uid) {
                        arr.push(d);
                        if(d.type === 'wd' && d.status === 'pending') isPendingWD = true;
                    }
                });

                document.getElementById('w-btn').disabled = isPendingWD;
                document.getElementById('w-msg').classList.toggle('hidden', !isPendingWD);

                arr.reverse().forEach(d => {
                    let b = d.type==='depo' ? `<a href="${d.proof}" target="_blank" class="mt-4 block py-2 bg-sky-100 text-sky-600 rounded-xl text-[9px] font-black text-center uppercase border border-sky-200">Lihat Bukti</a>` : '';
                    list.insertAdjacentHTML('beforeend', `<div class="p-5 bg-white rounded-[25px] border border-slate-100 mb-3 shadow-sm flex flex-col">
                        <div class="flex justify-between items-center"><div><p class="text-[10px] font-black uppercase italic">${d.type}</p></div><div class="text-right"><p class="font-black text-sm">Rp${d.amount.toLocaleString()}</p><p class="text-[8px] font-black uppercase text-slate-300">${d.status}</p></div></div>${b}
                    </div>`);
                });
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Pilih nominal dan upload bukti!");
            const rd = new FileReader(); rd.readAsDataURL(fl);
            rd.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: rd.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Laporan terkirim!"); window.location.reload();
            };
        };

        window.handleWD = async () => {
            if(isPendingWD) return alert("Selesaikan WD sebelumnya!");
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(!amt || amt < 1000 || amt > uBal || !ph) return alert("Cek saldo dan data Anda!");
            await set(push(ref(db, 'transactions')), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("WD diproses!"); window.location.reload();
        };
    </script>
</body>
</html>
