<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RaCloud</title>
    <script>
        (function() {
            const sAuth = sessionStorage.getItem('ra_session_status');
            const sid = new URLSearchParams(window.location.search).get('sid');
            if (!sAuth || !sid || sAuth !== sid) window.location.replace('index.html');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-24">
    <header class="p-6 flex justify-between items-center bg-white/80 border-b sticky top-0 z-50">
        <div class="font-black text-sky-600 text-xl italic uppercase">RaCloud</div>
        <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
    </header>

    <div class="max-w-md mx-auto p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-sm border mb-8">
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Saldo Aktif</p>
            <h3 class="text-4xl font-black text-slate-900 italic">Rp<span id="balance">0</span></h3>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="switchTab('tab-depo')" class="bg-white p-6 rounded-[35px] text-center shadow-sm">
                <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-qrcode"></i></div>
                <p class="text-[10px] font-black uppercase">Merchant QRIS</p>
            </button>
            <button onclick="switchTab('tab-wd')" class="bg-white p-6 rounded-[35px] text-center shadow-sm">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-wallet"></i></div>
                <p class="text-[10px] font-black uppercase italic">Withdraw</p>
            </button>
        </div>

        <div id="tab-depo" class="tab-content bg-white p-6 rounded-[40px] mb-8 shadow-sm">
            <div id="m-setup" class="hidden text-center py-6">
                <input type="text" id="m-input" placeholder="NAMA TOKO ANDA" class="w-full p-4 rounded-2xl border text-center font-bold mb-4 uppercase outline-none">
                <button onclick="setupMerchant()" class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs">Cetak QRIS Berhias</button>
            </div>
            <div id="m-active" class="hidden">
                <canvas id="qris-cv" class="w-full rounded-2xl mb-6 shadow-inner border"></canvas>
                <input type="number" id="d-amt" placeholder="Nominal Isi Saldo" class="w-full p-4 rounded-2xl border mb-3 text-center font-bold outline-none">
                <input type="file" id="d-file" accept="image/*" class="w-full mb-4 text-[10px]">
                <button onclick="handleDepo()" class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs">Kirim Laporan</button>
            </div>
        </div>

        <div id="tab-wd" class="tab-content bg-white p-6 rounded-[40px] mb-8 shadow-sm">
            <input type="text" id="w-phone" placeholder="Nomor DANA" class="w-full p-4 rounded-2xl border mb-3 text-center font-bold outline-none">
            <input type="number" id="w-amt" placeholder="Nominal" class="w-full p-4 rounded-2xl border mb-5 text-center font-bold outline-none">
            <button onclick="handleWD()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Tarik Saldo</button>
        </div>

        <div id="h-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let userUid = null;

        onAuthStateChanged(auth, u => {
            if(!u) window.location.replace('index.html');
            else { userUid = u.uid; sync(u.uid); checkM(u.uid); }
        });

        async function checkM(uid) {
            const s = await get(ref(db, `users/${uid}/merchant_name`));
            if(s.exists()) {
                document.getElementById('m-active').classList.remove('hidden');
                drawQR(s.val());
            } else {
                document.getElementById('m-setup').classList.remove('hidden');
            }
        }

        window.setupMerchant = async () => {
            const name = document.getElementById('m-input').value.trim();
            if(!name) return alert("Isi nama toko!");
            await set(ref(db, `users/${userUid}/merchant_name`), name);
            // Notif bot dashboard
            const botToken = "8786682343:AAFJ_OR9__rrJdUKRLbQ6uTrRrNfcrGuOAU";
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: "8362148317", text: `🏪 NEW MERCHANT: ${name.toUpperCase()}\nID: ${userUid}`, parse_mode: "Markdown"})
            });
            window.location.reload();
        };

        function drawQR(name) {
            const cv = document.getElementById('qris-cv'), cx = cv.getContext('2d');
            const bg = new Image(); bg.crossOrigin = "anonymous";
            bg.src = "https://i.ibb.co.com/1000101921/hiasan-qris.jpg"; // Gambar hiasan dari filemu
            bg.onload = () => {
                cv.width = bg.width; cv.height = bg.height;
                cx.drawImage(bg, 0, 0);
                cx.fillStyle = "#334155"; cx.font = "bold 55px sans-serif"; cx.textAlign = "center";
                cx.fillText(name.toUpperCase(), cv.width/2, 185); // Posisikan di tulisan "NAMA"
                cx.font = "32px sans-serif"; cx.fillText("NMID: ID102000882008519349", cv.width/2, 255);
            };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { document.getElementById('balance').innerText = (s.val() || 0).toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    if(d.uid === uid) {
                        list.insertAdjacentHTML('afterbegin', `<div class="p-4 bg-white rounded-2xl mb-2 border flex justify-between items-center text-xs"><span>${d.type.toUpperCase()}</span><b>Rp${d.amount.toLocaleString()}</b><span class="uppercase font-black text-[8px]">${d.status}</span></div>`);
                    }
                });
            });
        }

        window.handleDepo = () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Lengkapi data!");
            const rd = new FileReader(); rd.readAsDataURL(fl);
            rd.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: rd.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Laporan Terkirim!"); window.location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(!amt || !ph) return alert("Cek data!");
            await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("WD Sedang Diproses!"); window.location.reload();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.logout = () => signOut(auth).then(() => { sessionStorage.clear(); window.location.replace('index.html'); });
    </script>
</body>
</html>
