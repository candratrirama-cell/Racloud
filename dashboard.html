<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Dashboard</title>
    <script>
        (function(){
            const urlToken = new URLSearchParams(window.location.search).get('sid');
            const storedToken = sessionStorage.getItem('ra_active_token');
            if (!urlToken || urlToken !== storedToken) {
                sessionStorage.clear(); window.location.replace('index.html');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div id="app-body">
        <header class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
            <div class="font-black text-sky-600 text-xl tracking-tighter italic uppercase">RaCloud</div>
            <div class="flex gap-3">
                <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center border border-green-100 shadow-sm"><i class="fab fa-whatsapp"></i></a>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center border border-red-100 shadow-sm"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="max-w-md mx-auto p-6">
            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 mb-8 relative overflow-hidden">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 relative z-10">Saldo Aktif</p>
                <h3 class="text-4xl font-black text-slate-900 italic tracking-tighter relative z-10">Rp<span id="balance">0</span></h3>
                <p id="user-display-name" class="mt-4 text-[10px] font-black text-slate-500 uppercase tracking-widest relative z-10"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchTab('tab-depo')" class="glass p-6 rounded-[35px] text-center shadow-sm">
                    <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-qrcode"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Merchant QRIS</p>
                </button>
                <button onclick="switchTab('tab-wd')" class="glass p-6 rounded-[35px] text-center shadow-sm">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-wallet"></i></div>
                    <p class="text-[10px] font-black text-slate-700 uppercase italic">Withdraw DANA</p>
                </button>
            </div>

            <div id="tab-depo" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <div id="merchant-setup" class="hidden text-center py-6">
                    <h4 class="text-sm font-black text-slate-800 uppercase italic mb-2">Buka Merchant Baru</h4>
                    <input type="text" id="m-name-input" placeholder="Nama Merchant" class="w-full p-4 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-4 outline-none focus:ring-2 ring-sky-100 uppercase">
                    <button onclick="setupMerchant()" class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Cetak QRIS GPN</button>
                </div>

                <div id="merchant-active" class="hidden">
                    <div class="bg-white p-2 rounded-3xl mb-6 shadow-inner border border-slate-50">
                        <canvas id="qris-canvas" class="w-full rounded-2xl"></canvas>
                    </div>
                    <input type="number" id="d-amt" placeholder="Nominal Isi Saldo" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-3">
                    <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-slate-100 text-center mb-5">
                        <input type="file" id="d-file" accept="image/*" class="text-[9px] w-full">
                    </div>
                    <button id="d-btn" onclick="handleDepo()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-black uppercase text-xs">Konfirmasi Deposit</button>
                </div>
            </div>

            <div id="tab-wd" class="tab-content glass p-6 rounded-[40px] mb-8 shadow-sm">
                <input type="text" id="w-phone" placeholder="Nomor DANA" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-3">
                <input type="number" id="w-amt" placeholder="Nominal Penarikan" class="w-full p-5 rounded-2xl bg-white border border-slate-100 text-center font-bold mb-5">
                <button id="w-btn" onclick="handleWD()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs disabled:bg-slate-200">Tarik Saldo</button>
                <p id="w-msg" class="text-[10px] text-red-500 font-bold text-center mt-6 hidden italic">Selesaikan WD sebelumnya dulu!</p>
            </div>

            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-50">
                <div id="h-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></div>
            </div>
            
            <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="mt-8 flex items-center justify-center gap-3 w-full py-5 bg-green-500 text-white rounded-[30px] font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-green-100">
                <i class="fab fa-whatsapp"></i> Gabung Grup WhatsApp
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let uBal = 0, isPendingWD = false, userUid = null;

        onAuthStateChanged(auth, u => {
            if(!u) window.location.replace('index.html');
            else {
                userUid = u.uid;
                document.getElementById('user-display-name').innerText = u.displayName;
                checkMerchantStatus(u);
                sync(u.uid);
            }
        });

        async function checkMerchantStatus(u) {
            const snap = await get(ref(db, `users/${u.uid}/merchant_name`));
            if(snap.exists()) {
                document.getElementById('merchant-active').classList.remove('hidden');
                drawGPNQRIS(snap.val());
            } else {
                document.getElementById('merchant-setup').classList.remove('hidden');
            }
        }

        window.setupMerchant = async () => {
            const mName = document.getElementById('m-name-input').value.trim();
            if(!mName) return alert("Masukkan nama merchant!");
            
            // Simpan ke Firebase
            await set(ref(db, `users/${userUid}/merchant_name`), mName);

            // Kirim Notif ke Bot Khusus (Token 2)
            const botToken = "8786682343:AAFJ_OR9__rrJdUKRLbQ6uTrRrNfcrGuOAU";
            const chatId = "8362148317";
            const msg = `🏪 *MERCHANT BARU DICETAK*\n\n👤 User: ${auth.currentUser.displayName}\n🏪 Toko: ${mName}\n🆔 ID: ${userUid}\n\n✅ Tampilan GPN Aktif!`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: "Markdown" })
                });
            } catch (e) { console.log("Gagal kirim notif"); }

            alert("QRIS GPN Berhasil Dicetak!");
            window.location.reload();
        };

        function drawGPNQRIS(mName) {
            const cv = document.getElementById('qris-canvas'), cx = cv.getContext('2d');
            const im = new Image(); im.crossOrigin = "anonymous";
            im.src = "https://i.ibb.co.com/7d4MhQtf/Tak-berjudul34-20260413183523.jpg"; 

            im.onload = () => { 
                cv.width = im.width; cv.height = im.height; 
                cx.drawImage(im, 0, 0); 
                cx.fillStyle = "#334155";
                cx.font = "bold 60px 'Plus Jakarta Sans', sans-serif";
                cx.textAlign = "center";
                cx.fillText(mName.toUpperCase(), cv.width / 2, 315); 
            };
        }

        function sync(uid) {
            onValue(ref(db, `users/${uid}/balance`), s => { uBal = s.val() || 0; document.getElementById('balance').innerText = uBal.toLocaleString(); });
            onValue(ref(db, 'transactions'), snap => {
                const list = document.getElementById('h-list'); list.innerHTML = "";
                isPendingWD = false;
                let arr = []; 
                snap.forEach(c => { 
                    const d = c.val();
                    if(d.uid === uid) {
                        arr.push(d);
                        if(d.type === 'wd' && d.status === 'pending') isPendingWD = true;
                    }
                });
                document.getElementById('w-btn').disabled = isPendingWD;
                document.getElementById('w-msg').classList.toggle('hidden', !isPendingWD);
                arr.reverse().slice(0, 10).forEach(d => {
                    list.insertAdjacentHTML('beforeend', `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center mb-2 shadow-sm"><p class="text-[9px] font-black uppercase italic text-slate-400">${d.type}</p><div class="text-right"><p class="font-black text-slate-800 text-xs">Rp${d.amount.toLocaleString()}</p><p class="text-[7px] font-black uppercase text-amber-500">${d.status}</p></div></div>`);
                });
            });
        }

        window.handleDepo = async () => {
            const amt = document.getElementById('d-amt').value, fl = document.getElementById('d-file').files[0];
            if(!amt || !fl) return alert("Pilih nominal dan upload bukti!");
            const rd = new FileReader(); rd.readAsDataURL(fl);
            rd.onload = async () => {
                await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: parseInt(amt), proof: rd.result, status: 'pending', type: 'depo', time: Date.now() });
                alert("Deposit diajukan!"); window.location.reload();
            };
        };

        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('w-amt').value), ph = document.getElementById('w-phone').value;
            if(!amt || amt < 1000 || amt > uBal || !ph) return alert("Saldo tidak cukup atau data salah!");
            await set(push(ref(db, 'transactions')), { uid: userUid, name: auth.currentUser.displayName, amount: amt, phone: ph, status: 'pending', type: 'wd', time: Date.now() });
            alert("WD diajukan!"); window.location.reload();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.logout = () => signOut(auth);
    </script>
</body>
</html>
