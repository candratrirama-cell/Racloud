<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollaps Flum - Dashboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #212121; }
        .sidebar { background-color: #171717; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #3f3f46; border-radius: 9px; }
    </style>
</head>
<body class="text-gray-200 h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-64 sidebar border-b md:border-b-0 md:border-r border-zinc-800 p-4 flex flex-col justify-between shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-6 px-2">
                <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-black">O</div>
                <span class="text-lg font-bold text-white tracking-tight">Ollaps Flum</span>
            </div>
            
            <nav class="space-y-1 flex flex-row md:flex-col overflow-x-auto md:overflow-visible gap-2 md:gap-1 pb-2 md:pb-0">
                <button onclick="switchTab('chat')" id="btn-chat" class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 bg-zinc-800 text-white shrink-0">
                    <i data-lucide="message-square" class="w-4 h-4 text-emerald-400"></i> AI Chatbot
                </button>
                <button onclick="switchTab('editimage')" id="btn-editimage" class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 hover:bg-zinc-800/50 text-zinc-400 hover:text-white shrink-0">
                    <i data-lucide="image-minus" class="w-4 h-4 text-cyan-400"></i> Ubah Objek Gambar
                </button>
                <button onclick="switchTab('generateimage')" id="btn-generateimage" class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 hover:bg-zinc-800/50 text-zinc-400 hover:text-white shrink-0">
                    <i data-lucide="sparkles" class="w-4 h-4 text-purple-400"></i> Generate Gambar
                </button>
                <button onclick="switchTab('music')" id="btn-music" class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 hover:bg-zinc-800/50 text-zinc-400 hover:text-white shrink-0">
                    <i data-lucide="music" class="w-4 h-4 text-amber-400"></i> Generate Musik
                </button>
            </nav>
        </div>
        
        <div class="hidden md:block pt-4 border-t border-zinc-800 text-xs text-zinc-500 px-2">
            Model Powered by Nexray
        </div>
    </aside>

    <main class="flex-1 flex flex-col justify-between overflow-hidden bg-[#212121]">
        
        <header class="h-14 border-b border-zinc-800/60 px-6 flex items-center justify-between shrink-0">
            <h2 id="panel-title" class="text-sm font-semibold tracking-wide text-zinc-300">AI CHATBOT</h2>
            
            <div id="model-selector-wrapper">
                <select id="model-select" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-xs text-zinc-300 focus:outline-none">
                    <option value="ollag">OllaG 1.5 (GPT 3.5)</option>
                    <option value="ollfux">Ollfux 1.0 (Turbochat)</option>
                </select>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 chat-container flex flex-col gap-6" id="output-panel">
            <div id="chat-welcome" class="m-auto text-center max-w-md p-4">
                <div class="text-4xl mb-4">🚀</div>
                <h3 class="text-xl font-bold text-white mb-2">Bagaimana saya bisa membantu Anda hari ini?</h3>
                <p class="text-xs text-zinc-500">Mulai kirimkan pesan atau pilih opsi pengolah media lainnya di panel kiri.</p>
            </div>
            <div id="chat-history" class="w-full max-w-3xl mx-auto space-y-6 hidden"></div>
        </div>

        <div class="p-4 border-t border-zinc-800/50 bg-[#212121] shrink-0">
            <div class="max-w-3xl mx-auto relative">
                
                <div id="input-interface-wrapper" class="bg-zinc-800 rounded-2xl border border-zinc-700/80 shadow-xl overflow-hidden p-3">
                    
                    <div id="image-upload-zone" class="hidden mb-3">
                        <label class="flex items-center gap-2 cursor-pointer bg-zinc-700/50 hover:bg-zinc-700 px-3 py-2 rounded-xl text-xs border border-dashed border-zinc-500 text-zinc-300 w-fit">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i>
                            <span id="file-label">Pilih Gambar Objek</span>
                            <input type="file" id="image-file-input" accept="image/*" class="hidden" onchange="updateFileLabel()">
                        </label>
                    </div>

                    <div class="flex items-end gap-2">
                        <textarea id="user-input" rows="1" placeholder="Ketik pesan di sini..." class="w-full bg-transparent text-sm text-white resize-none focus:outline-none max-h-32 py-1 px-2" oninput="autoGrow(this)"></textarea>
                        <button onclick="processAction()" class="bg-white hover:bg-zinc-200 text-black p-2 rounded-xl transition-all shrink-0">
                            <i data-lucide="arrow-up" class="w-4 h-4 font-bold"></i>
                        </button>
                    </div>
                </div>
                
                <p class="text-center text-[10px] text-zinc-600 mt-2">Ollaps Flum dapat membuat kesalahan. Pertimbangkan untuk memeriksa informasi penting.</p>
            </div>
        </div>
    </main>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        let currentTab = 'chat';

        function autoGrow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight) + "px";
        }

        function updateFileLabel() {
            const input = document.getElementById('image-file-input');
            const label = document.getElementById('file-label');
            if(input.files.length > 0) {
                label.innerText = input.files[0].name;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const title = document.getElementById('panel-title');
            const modelWrapper = document.getElementById('model-selector-wrapper');
            const modelSelect = document.getElementById('model-select');
            const uploadZone = document.getElementById('image-upload-zone');
            const userInput = document.getElementById('user-input');
            const outputPanel = document.getElementById('output-panel');
            
            // Reset active states button
            ['chat', 'editimage', 'generateimage', 'music'].forEach(t => {
                document.getElementById(`btn-${t}`).className = "w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 hover:bg-zinc-800/50 text-zinc-400 hover:text-white shrink-0";
            });

            // Set active active button
            let activeColor = 'emerald';
            if (tab === 'editimage') activeColor = 'cyan';
            if (tab === 'generateimage') activeColor = 'purple';
            if (tab === 'music') activeColor = 'amber';
            document.getElementById(`btn-${tab}`).className = `w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 bg-zinc-800 text-white shrink-0`;

            // Reset view content
            outputPanel.innerHTML = '';
            userInput.value = '';
            userInput.style.height = 'auto';

            if(tab === 'chat') {
                title.innerText = "AI CHATBOT";
                modelWrapper.classList.remove('hidden');
                uploadZone.classList.add('hidden');
                userInput.placeholder = "Ketik pesan untuk OllaG atau Ollfux...";
                
                outputPanel.innerHTML = `
                    <div id="chat-welcome" class="m-auto text-center max-w-md p-4">
                        <div class="text-4xl mb-4">🚀</div>
                        <h3 class="text-xl font-bold text-white mb-2">Bagaimana saya bisa membantu Anda hari ini?</h3>
                    </div>
                    <div id="chat-history" class="w-full max-w-3xl mx-auto space-y-6 hidden"></div>`;
            } else if(tab === 'editimage') {
                title.innerText = "UBAH OBJEK GAMBAR";
                modelWrapper.classList.add('hidden');
                uploadZone.classList.remove('hidden');
                userInput.placeholder = "Masukkan deskripsi perubahan (Contoh: ubah warna baju jadi merah)...";
            } else if(tab === 'generateimage') {
                title.innerText = "GENERATE GAMBAR KREATIF";
                modelWrapper.classList.remove('hidden');
                userInput.placeholder = "Masukkan deskripsi gambar yang ingin dibuat...";
                
                // Ganti isi opsi model khusus generate image
                modelSelect.innerHTML = `
                    <option value="ollagama2">Ollagama 2.1 Beta (Magicstudio)</option>
                    <option value="ollagama5">Ollagama 5.3 Orcasta (Ideogram)</option>
                `;
                uploadZone.classList.add('hidden');
            } else if(tab === 'music') {
                title.innerText = "GENERATE MUSIK AI";
                modelWrapper.classList.add('hidden');
                uploadZone.classList.add('hidden');
                userInput.placeholder = "Masukkan prompt genre / lirik musik (Contoh: Lagu pop ceria)...";
            }
            lucide.createIcons();
        }

        async function processAction() {
            const userInput = document.getElementById('user-input');
            const promptText = userInput.value.trim();
            const outputPanel = document.getElementById('output-panel');

            if (!promptText && currentTab !== 'editimage') return;

            // Render view user query/proses
            if (currentTab === 'chat') {
                const welcome = document.getElementById('chat-welcome');
                const history = document.getElementById('chat-history');
                if (welcome) welcome.remove();
                history.classList.remove('hidden');

                // Tambah Chat User ke UI
                history.innerHTML += `
                    <div class="flex gap-4 justify-end">
                        <div class="bg-zinc-800 text-zinc-100 px-4 py-2.5 rounded-2xl max-w-xl text-sm">${promptText}</div>
                    </div>`;
                
                // Efek loading bot
                const botLoadingId = 'load-' + Date.now();
                history.innerHTML += `
                    <div class="flex gap-4 items-start" id="${botLoadingId}">
                        <div class="w-7 h-7 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-xs font-bold shrink-0">O</div>
                        <div class="text-sm text-zinc-400 animate-pulse mt-1">Sedang berpikir...</div>
                    </div>`;
                
                outputPanel.scrollTop = outputPanel.scrollHeight;
                userInput.value = '';

                // Ambil pilihan model chat
                const model = document.getElementById('model-select').value;
                
                try {
                    const response = await fetch(`/api/ai?type=chat&model=${model}&text=${encodeURIComponent(promptText)}`);
                    const data = await response.json();
                    
                    document.getElementById(botLoadingId).remove();
                    history.innerHTML += `
                        <div class="flex gap-4 items-start">
                            <div class="w-7 h-7 rounded-full bg-emerald-500 text-black flex items-center justify-center text-xs font-bold shrink-0">O</div>
                            <div class="text-sm text-zinc-200 bg-zinc-900/30 p-4 rounded-2xl max-w-2xl border border-zinc-800/40 leading-relaxed whitespace-pre-wrap">${data.result}</div>
                        </div>`;
                } catch(err) {
                    document.getElementById(botLoadingId).remove();
                    history.innerHTML += `<div class="text-xs text-red-400 text-center">Gagal memuat respons. Coba lagi nanti.</div>`;
                }
                outputPanel.scrollTop = outputPanel.scrollHeight;

            } else if (currentTab === 'generateimage') {
                const model = document.getElementById('model-select').value;
                outputPanel.innerHTML = `<div class="m-auto text-center text-sm text-zinc-400 animate-pulse"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2 text-purple-400"></i>Sedang memproses mahakarya foto...</div>`;
                lucide.createIcons();
                userInput.value = '';

                try {
                    const response = await fetch(`/api/ai?type=image&model=${model}&prompt=${encodeURIComponent(promptText)}`);
                    const data = await response.json();

                    outputPanel.innerHTML = `
                        <div class="m-auto max-w-md bg-zinc-900 rounded-2xl border border-zinc-800 p-4 shadow-xl text-center">
                            <img src="${data.url}" class="w-full h-auto rounded-xl object-cover mb-4 border border-zinc-700" alt="Generated AI">
                            <p class="text-xs text-zinc-400 font-medium italic">"${promptText}"</p>
                            <a href="${data.url}" target="_blank" class="mt-4 inline-flex items-center gap-2 text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-white font-medium transition-all">Unduh Gambar</a>
                        </div>`;
                } catch(err) {
                    outputPanel.innerHTML = `<div class="m-auto text-xs text-red-400">Gagal men-generate gambar.</div>`;
                }

            } else if (currentTab === 'music') {
                outputPanel.innerHTML = `<div class="m-auto text-center text-sm text-zinc-400 animate-pulse"><i data-lucide="music-4" class="w-6 h-6 animate-spin mx-auto mb-2 text-amber-400"></i>Ollmu 1.0 Sedang meracik musik hits Anda...</div>`;
                lucide.createIcons();
                userInput.value = '';

                try {
                    const response = await fetch(`/api/ai?type=music&prompt=${encodeURIComponent(promptText)}`);
                    const data = await response.json();

                    outputPanel.innerHTML = `
                        <div class="m-auto max-w-sm bg-zinc-900 rounded-2xl border border-zinc-800 p-6 text-center shadow-2xl">
                            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-amber-400 to-orange-500 flex items-center justify-center text-black font-bold mx-auto mb-4 animate-bounce">🎵</div>
                            <h4 class="text-sm font-semibold text-white mb-1">Hasil Musik Anda</h4>
                            <p class="text-xs text-zinc-500 mb-4">Prompt: "${promptText}"</p>
                            <audio controls class="w-full accent-amber-500 mt-2">
                                <source src="${data.url}" type="audio/mpeg">
                                Browser Anda tidak mendukung pemutar audio.
                            </audio>
                        </div>`;
                } catch(err) {
                    outputPanel.innerHTML = `<div class="m-auto text-xs text-red-400">Gagal men-generate musik.</div>`;
                }

            } else if (currentTab === 'editimage') {
                const imageFile = document.getElementById('image-file-input').files[0];
                if (!imageFile) {
                    alert('Harap unggah gambar terlebih dahulu!');
                    return;
                }

                outputPanel.innerHTML = `<div class="m-auto text-center text-sm text-zinc-400 animate-pulse"><i data-lucide="refresh-cw" class="w-6 h-6 animate-spin mx-auto mb-2 text-cyan-400"></i>Menghitung pixel dan mengedit objek gambar...</div>`;
                lucide.createIcons();
                userInput.value = '';

                const formData = new FormData();
                formData.append('image', imageFile);
                formData.append('param', promptText);

                try {
                    const response = await fetch('/api/edit-image', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    outputPanel.innerHTML = `
                        <div class="m-auto max-w-md bg-zinc-900 rounded-2xl border border-zinc-800 p-4 shadow-xl text-center">
                            <img src="${data.url}" class="w-full h-auto rounded-xl object-cover mb-4 border border-zinc-700" alt="Edited Image AI">
                            <p class="text-xs text-zinc-400 font-medium">Modifikasi sukses dilakukan!</p>
                            <a href="${data.url}" target="_blank" class="mt-4 inline-flex items-center gap-2 text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-white font-medium transition-all">Unduh Hasil</a>
                        </div>`;
                } catch(err) {
                    outputPanel.innerHTML = `<div class="m-auto text-xs text-red-400">Gagal mengubah objek gambar. Pastikan format gambar sesuai.</div>`;
                }
            }
        }
    </script>
</body>
</html>
