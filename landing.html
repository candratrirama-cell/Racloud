<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Welcome</title>
    <script>
        // PROTEKSI SESI
        (function(){
            const urlToken = new URLSearchParams(window.location.search).get('sid');
            const storedToken = sessionStorage.getItem('ra_active_token');
            if (!urlToken || urlToken !== storedToken) {
                sessionStorage.clear(); window.location.replace('index.html');
            }
            window.onbeforeunload = () => { sessionStorage.removeItem('ra_access_granted'); };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#f0f9ff]">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <div class="text-sky-600 font-extrabold text-2xl italic tracking-tighter"><i class="fas fa-cloud"></i> RaCloud</div>
        <a href="https://chat.whatsapp.com/G7TBwD4vIDb20ZxbUJXane" class="text-green-600 font-bold text-xs bg-green-50 px-4 py-2 rounded-full border border-green-100">Komunitas</a>
    </nav>
    <main class="flex flex-col items-center justify-center text-center px-6 mt-20">
        <div class="w-20 h-20 bg-sky-100 text-sky-600 rounded-3xl flex items-center justify-center text-3xl mb-8 animate-bounce shadow-inner">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="text-5xl font-extrabold text-slate-900 mb-6 leading-tight tracking-tighter italic">Kelola Saldo <br><span class="text-sky-600">Tanpa Batas</span></h1>
        <p class="text-slate-400 mb-10 max-w-xs font-medium">Platform ekosistem digital aman dengan integrasi cloud otomatis.</p>
        <button onclick="nav('login')" class="w-full max-w-xs bg-sky-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">Mulai Sekarang</button>
    </main>

    <script>
        function nav(page) {
            const sid = sessionStorage.getItem('ra_active_token');
            window.location.href = `${page}.html?sid=${sid}`;
        }
    </script>
</body>
</html>
