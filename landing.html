<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white h-screen flex flex-col items-center justify-center p-10 text-center">
    <h2 class="text-4xl font-black italic uppercase text-slate-900 mb-4">Ready to Cloud?</h2>
    <p class="text-slate-500 mb-10 text-sm">Kelola transaksi QRIS dan saldo Anda dengan aman.</p>
    <button onclick="lanjut()" class="px-10 py-4 bg-sky-600 text-white rounded-full font-black uppercase text-xs tracking-[0.2em]">Mulai Sekarang</button>

    <script>
        if(!sessionStorage.getItem('temp_sid')) window.location.replace('index.html');
        function lanjut() { window.location.href = "login.html"; }
    </script>
</body>
</html>
