<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>XND Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-5">
            <h1 class="text-3xl font-black text-primary">ADMIN <span class="text-white">CONTROL</span></h1>
            <div id="admin-info" class="text-right">
                <p id="admin-email" class="text-xs font-mono"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <p class="text-slate-400 text-sm">Total Deployments</p>
                <h3 id="stat-total" class="text-4xl font-black mt-2">0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <p class="text-slate-400 text-sm">Total Visitors</p>
                <h3 id="stat-visitors" class="text-4xl font-black mt-2 text-green-400">0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <p class="text-slate-400 text-sm">Active Users Now</p>
                <h3 id="stat-active" class="text-4xl font-black mt-2 text-blue-400">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <h2 class="font-bold mb-4 uppercase text-slate-400">Daftar Project User</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="border-b border-slate-700">
                                <th class="pb-3">Subdomain</th>
                                <th class="pb-3">Owner</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 h-fit">
                <h2 class="font-bold mb-4 uppercase text-slate-400">Domain Management</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newDomain" class="bg-slate-900 border border-slate-700 p-3 rounded-xl flex-1" placeholder="tambahdomain.com">
                    <button onclick="addDomain()" class="bg-blue-600 px-6 py-3 rounded-xl font-bold">ADD</button>
                </div>
                <div id="domain-list" class="space-y-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* PASTE CONFIG KAMU */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // PROTEKSI ADMIN: Hanya email kamu yang bisa akses
        const ADMIN_EMAIL = "email-kamu@gmail.com"; 

        auth.onAuthStateChanged(user => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert("Akses Ditolak!");
                window.location.href = "index.html";
            }
            document.getElementById('admin-email').innerText = user.email;
            loadData();
        });

        function loadData() {
            // Load Deployments & Analytics
            db.ref('deployments').on('value', snap => {
                const data = snap.val();
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                let totalVisit = 0;
                let activeNow = 0;
                let count = 0;

                for (let sub in data) {
                    count++;
                    const item = data[sub];
                    const status = item.active !== false ? '✅ Active' : '❌ Disabled';
                    
                    // Ambil stats (contoh field: visits)
                    const visits = item.visits || 0;
                    totalVisit += visits;

                    tbody.innerHTML += `
                        <tr class="border-b border-slate-700/50">
                            <td class="py-4 font-bold">${sub}</td>
                            <td class="py-4 text-xs opacity-60">${item.owner}</td>
                            <td class="py-4 text-xs">${status}</td>
                            <td class="py-4">
                                <button onclick="toggleDomain('${sub}', ${item.active !== false})" class="text-xs font-bold underline ${item.active !== false ? 'text-red-400' : 'text-green-400'}">
                                    ${item.active !== false ? 'Matikan' : 'Aktifkan'}
                                </button>
                            </td>
                        </tr>
                    `;
                }
                document.getElementById('stat-total').innerText = count;
                document.getElementById('stat-visitors').innerText = totalVisit;
            });
        }

        async function toggleDomain(sub, currentStatus) {
            await db.ref('deployments/' + sub).update({ active: !currentStatus });
            alert(`Domain ${sub} ${!currentStatus ? 'Aktif' : 'Mati'}`);
        }
    </script>
</body>
</html>
