<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-sky-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white/80 backdrop-blur-md p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center border border-white">
        <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic">MASUK AKUN</h2>
        <p class="text-slate-400 text-xs font-bold mt-2 mb-8">Verifikasi identitas cloud Anda.</p>
        <button id="btn-login" class="w-full py-4 bg-white border-2 border-slate-100 rounded-2xl flex items-center justify-center gap-3 font-bold text-slate-700 shadow-sm active:scale-95 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Lanjutkan dengan Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Security Check
        if(sessionStorage.getItem('ra_access_granted') !== 'true') window.location.href = 'index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        onAuthStateChanged(auth, u => { if(u) window.location.href = 'dashboard.html'; });
    </script>
</body>
</html>
