<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOKOS GRATIS - @MARAMADHONA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f0f7ff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e3a8a;
        }
        /* Style Neo-Brutalism Biru Putih */
        .neo-card {
            background: white;
            border: 4px solid #1e40af;
            box-shadow: 10px 10px 0px #1e40af;
            border-radius: 20px;
        }
        .input-game {
            border: 3px solid #bfdbfe;
            transition: all 0.2s;
            font-weight: 700;
        }
        .input-game:focus {
            border-color: #2563eb;
            box-shadow: 4px 4px 0px #bfdbfe;
            outline: none;
        }
        .btn-send {
            background: #2563eb;
            border-bottom: 6px solid #1e3a8a;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .btn-send:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full animate__animated animate__zoomIn">
        <div class="neo-card p-8 relative overflow-hidden">
            <div class="absolute -top-5 -right-5 w-24 h-24 bg-blue-100 rounded-full floating opacity-50"></div>
            
            <header class="text-center mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter text-blue-700 italic">FREE NOKOS</h1>
                <p class="text-xs font-black text-blue-400 tracking-[0.2em] uppercase">Identity: GoR 1.1</p>
            </header>

            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase text-blue-900 mb-1">1. Merk HP @MARAMADHONA & Serinya?</label>
                    <input type="text" id="q1" placeholder="Jawaban..." class="w-full p-4 input-game rounded-xl">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-blue-900 mb-1">2. Asal Kota @MARAMADHONA?</label>
                    <input type="text" id="q2" placeholder="Jawaban..." class="w-full p-4 input-game rounded-xl">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-blue-900 mb-1">3. Username TikTok Kamu</label>
                    <input type="text" id="tiktok" placeholder="@username" class="w-full p-4 input-game rounded-xl">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-blue-900 mb-1">4. Nomor WA Aktif</label>
                    <input type="number" id="wa" placeholder="08xxxxxxxx" class="w-full p-4 input-game rounded-xl">
                </div>

                <div class="pt-4">
                    <button onclick="kirimData()" class="w-full py-5 btn-send rounded-2xl text-xl tracking-widest">
                        KLAIM SEKARANG! 🚀
                    </button>
                </div>
            </div>

            <footer class="mt-6 text-center">
                <p class="text-[9px] font-bold text-blue-300 leading-tight">
                    Wajib follow @maramadhona. <br>
                    Sistem otomatis mendeteksi duplikat data.
                </p>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // Konfigurasi Project my-apibase (Region asia-southeast1)
        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            storageBucket: "my-apibase.firebasestorage.app",
            messagingSenderId: "57472085982",
            appId: "1:57472085982:web:40390e5605f296e02ef74f",
            measurementId: "G-DY9DC46TE8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const analytics = getAnalytics(app);

        window.kirimData = async function() {
            const q1 = document.getElementById('q1').value.trim();
            const q2 = document.getElementById('q2').value.trim();
            const tiktok = document.getElementById('tiktok').value.trim().replace('@', '');
            const wa = document.getElementById('wa').value.trim();

            if (!q1 || !q2 || !tiktok || !wa) {
                return Swal.fire({
                    icon: 'warning',
                    title: 'Data Belum Lengkap!',
                    text: 'Semua kolom wajib diisi ya.',
                    confirmButtonColor: '#2563eb'
                });
            }

            Swal.fire({
                title: 'Sedang Memproses...',
                text: 'Harap tunggu sebentar.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                // Cek duplikat di antrian atau peserta_lolos
                const checkRef = ref(db, 'antrian/' + wa);
                const checkLolosRef = ref(db, 'peserta_lolos/' + wa);
                
                const [snapAntrian, snapLolos] = await Promise.all([get(checkRef), get(checkLolosRef)]);

                if (snapAntrian.exists() || snapLolos.exists()) {
                    return Swal.fire('Maaf!', 'Nomor WA ini sudah terdaftar sebelumnya.', 'error');
                }

                // Kirim ke folder 'antrian' untuk divalidasi bot Termux
                await set(ref(db, 'antrian/' + wa), {
                    jawaban_hp: q1,
                    jawaban_kota: q2,
                    username_tt: tiktok,
                    no_wa: wa,
                    waktu: new Date().toLocaleString()
                });

                Swal.fire({
                    icon: 'success',
                    title: 'Terkirim!',
                    text: 'Jawabanmu sedang divalidasi. Pantau Telegram secara berkala!',
                    confirmButtonColor: '#2563eb'
                });

                document.querySelectorAll('input').forEach(i => i.value = '');

            } catch (error) {
                console.error(error);
                Swal.fire('Akses Ditolak', 'Terjadi kesalahan sistem atau akses ditolak.', 'error');
            }
        }
    </script>
</body>
</html>
