<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaCloud - Verifikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-6">
    <div id="main-card" class="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 w-full max-w-md text-center">
        <h1 class="font-black text-sky-600 text-3xl italic uppercase tracking-tighter mb-4">RaCloud</h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Verifikasi Keamanan</p>
        <button onclick="verifikasi()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-lg active:scale-95 transition-transform">
            Saya Bukan Robot
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            databaseURL: "https://my-apibase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Pantau Status Website dari Bot
        onValue(ref(db, 'system_settings/site_status'), (snap) => {
            const s = snap.val();
            if(s === 'close') {
                document.body.innerHTML = `<div class="h-screen w-full flex items-center justify-center bg-slate-900 text-white font-black uppercase italic">Website Sedang Offline</div>`;
            } else if(s === 'main') {
                document.body.innerHTML = `<div class="h-screen w-full flex items-center justify-center bg-amber-50 text-amber-900 font-black uppercase italic">Website Maintenance</div>`;
            }
        });

        window.verifikasi = () => {
            const sid = "RA-TEMP-" + Math.random().toString(36).substring(2, 10);
            sessionStorage.setItem('temp_sid', sid);
            window.location.href = "landing.html";
        };
    </script>
</body>
</html>
