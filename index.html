<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XND Cloud Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen">

    <nav class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-primary to-blue-400 rounded-xl flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-blue-500/20">X</div>
                <span class="font-extrabold text-xl tracking-tighter">XND <span class="text-primary underline decoration-2 underline-offset-4">PLATFORM</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:scale-110 transition">🌓</button>
                <div id="user-nav" class="hidden items-center gap-3 border-l pl-4 border-slate-200 dark:border-slate-800">
                    <img id="user-photo" src="" class="w-9 h-9 rounded-full border-2 border-primary p-0.5">
                    <button onclick="logout()" class="text-[10px] font-black tracking-widest text-red-500 hover:opacity-70 transition">LOGOUT</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="login-screen" class="flex flex-col items-center justify-center py-32 px-4">
        <div class="bg-white dark:bg-darkCard p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-white dark:border-slate-800">
            <h1 class="text-4xl font-black mb-4 leading-tight text-slate-900 dark:text-white">Start your <br><span class="text-primary">Journey.</span></h1>
            <p class="text-slate-500 dark:text-slate-400 mb-10 text-sm">Deploy folder website kamu dalam hitungan detik ke subdomain gratis.</p>
            <button onclick="login()" class="w-full py-4 px-6 bg-slate-900 dark:bg-primary text-white rounded-2xl font-bold flex items-center justify-center gap-3 hover:shadow-xl transition-all active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6">
                Connect with Google
            </button>
        </div>
    </div>

    <main id="dashboard" class="hidden max-w-6xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-2 space-y-8">
            <div class="bg-white dark:bg-darkCard p-8 md:p-10 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-black italic">/ New Deploy</h2>
                    <span class="px-3 py-1 bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400 text-[10px] font-bold rounded-full">SYSTEM ONLINE</span>
                </div>
                
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-black mb-3 text-slate-400 uppercase tracking-widest">Subdomain & Domain</label>
                        <div class="flex flex-col md:flex-row gap-3">
                            <input type="text" id="subdomain" class="flex-1 bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold" placeholder="nama-toko">
                            <select id="domainSelect" class="bg-white dark:bg-slate-800 border-2 border-primary p-4 rounded-2xl font-black text-primary outline-none cursor-pointer">
                                <option value="xdn.web.id">.xdn.web.id</option>
                                <option value="rzone.web.id">.rzone.web.id</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black mb-3 text-slate-400 uppercase tracking-widest">Website Files</label>
                        <div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-[2rem] p-12 text-center relative hover:border-primary transition group">
                            <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" webkitdirectory directory multiple>
                            <div class="space-y-4">
                                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center mx-auto group-hover:rotate-6 transition">
                                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                                </div>
                                <p id="file-name" class="font-bold text-slate-700 dark:text-slate-300">Pilih Folder Project</p>
                                <p id="file-count" class="text-xs font-bold text-primary"></p>
                            </div>
                        </div>
                    </div>

                    <button onclick="startDeploy()" id="deployBtn" class="w-full py-5 bg-primary text-white rounded-[1.5rem] font-black text-xl shadow-2xl shadow-blue-500/30 hover:translate-y-[-2px] transition-all active:scale-95 disabled:bg-slate-300 disabled:shadow-none">
                        LAUNCH WEBSITE
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-8">
            <div class="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-6 italic">/ Live Monitor</h3>
                <div id="log-box" class="bg-slate-900 text-green-400 p-5 rounded-2xl font-mono text-[9px] h-52 overflow-y-auto leading-loose border-2 border-slate-800 scrollbar-hide">
                    <div class="opacity-50">> Initializing XND-OS...</div>
                </div>
            </div>

            <div class="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-6 italic">/ My Domains</h3>
                <div id="project-list" class="space-y-4">
                    <p class="text-xs italic text-slate-400 text-center py-4">Situs Anda akan muncul di sini.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function addLog(msg, color = 'text-green-400') {
            const box = document.getElementById('log-box');
            const time = new Date().toLocaleTimeString([], {hour12: false});
            box.innerHTML += `<div class="${color}"><span class="text-slate-600">[${time}]</span> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // Auth
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const ls = document.getElementById('login-screen');
            const ds = document.getElementById('dashboard');
            const un = document.getElementById('user-nav');
            if (user) {
                ls.classList.add('hidden');
                ds.classList.remove('hidden');
                un.classList.replace('hidden', 'flex');
                document.getElementById('user-photo').src = user.photoURL;
                loadUserProjects();
                addLog(`Authorized: ${user.email}`, 'text-blue-400');
            } else {
                ls.classList.remove('hidden');
                ds.classList.add('hidden');
                un.classList.replace('flex', 'hidden');
            }
        });

        // File Handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                const folderName = files[0].webkitRelativePath.split('/')[0];
                document.getElementById('file-name').innerText = folderName;
                document.getElementById('file-count').innerText = `${files.length} Files Ready`;
                addLog(`Folder detected: ${folderName}`);
            }
        });

        // Deploy Engine
        async function startDeploy() {
            const subInput = document.getElementById('subdomain').value.toLowerCase().replace(/[^a-z0-9-]/g, '');
            const selectedDomain = document.getElementById('domainSelect').value;
            const fullSub = `${subInput}.${selectedDomain}`;
            const files = document.getElementById('fileInput').files;
            const btn = document.getElementById('deployBtn');

            if (!subInput || files.length === 0) return alert("Pilih nama dan folder project!");

            const hasIndex = Array.from(files).some(f => f.webkitRelativePath.endsWith('/index.html') || f.name === 'index.html');
            if (!hasIndex) return alert("Wajib ada file index.html di dalam folder!");

            btn.disabled = true;
            btn.innerText = "PREPARING...";

            try {
                // Check availability
                addLog(`Verifying: ${fullSub}`);
                const snap = await db.ref('deployments/' + subInput).once('value');
                if (snap.exists() && snap.val().owner !== auth.currentUser.email) {
                    alert("Maaf, subdomain ini sudah diklaim orang lain.");
                    throw new Error("Ownership restricted");
                }

                btn.innerText = "UPLOADING...";
                let uploadedCount = 0;

                // Loop files
                for (let file of files) {
                    const parts = file.webkitRelativePath.split('/');
                    parts.shift();
                    const relativePath = parts.join('/');
                    if (!relativePath) continue;

                    const base64 = await toBase64(file);
                    addLog(`Pushing: ${relativePath}`);

                    const res = await fetch('/api/deploy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sub: subInput,
                            domain: selectedDomain,
                            path: relativePath,
                            content: base64,
                            email: auth.currentUser.email
                        })
                    });
                    if (res.ok) uploadedCount++;
                }

                if (uploadedCount > 0) {
                    // Update Database for Admin & Stats
                    await db.ref('deployments/' + subInput).set({
                        owner: auth.currentUser.email,
                        domain: selectedDomain,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        active: true,
                        visits: 0 // Data awal statistik
                    });

                    addLog(`DEPLOY SUCCESS: ${fullSub}`, 'text-blue-400');
                    alert(`Selesai! Website kamu live di: https://${fullSub}`);
                    loadUserProjects();
                }

            } catch (err) {
                addLog(`ERR: ${err.message}`, 'text-red-500');
            } finally {
                btn.disabled = false;
                btn.innerText = "LAUNCH WEBSITE";
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        async function loadUserProjects() {
            const list = document.getElementById('project-list');
            const snap = await db.ref('deployments').once('value');
            list.innerHTML = '';
            let count = 0;

            snap.forEach(child => {
                const data = child.val();
                if (data.owner === auth.currentUser.email) {
                    count++;
                    const name = child.key;
                    const dom = data.domain || 'xdn.web.id';
                    list.innerHTML += `
                        <div class="p-5 bg-slate-50 dark:bg-slate-800/40 rounded-3xl border border-slate-100 dark:border-slate-800 flex justify-between items-center group hover:border-primary transition">
                            <div class="truncate mr-2">
                                <p class="text-[10px] font-black text-primary uppercase">${dom}</p>
                                <p class="font-bold text-xs truncate text-slate-600 dark:text-slate-300">${name}.${dom}</p>
                            </div>
                            <a href="https://${name}.${dom}" target="_blank" class="p-2 bg-white dark:bg-darkCard rounded-xl shadow-sm group-hover:bg-primary group-hover:text-white transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                        </div>`;
                }
            });
            if (count === 0) list.innerHTML = '<p class="text-[10px] text-center italic text-slate-400">Belum ada project aktif.</p>';
        }
    </script>
</body>
</html>
