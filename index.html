<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XND | FREE DEPLOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen">

    <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-darkCard sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold">X</div>
                <span class="font-extrabold text-xl tracking-tight uppercase">XND Deploy</span>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
        </div>
    </nav>

    <main id="dashboard" class="max-w-4xl mx-auto px-4 py-10">
        <div class="bg-white dark:bg-darkCard p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
            <h2 class="text-xl font-bold mb-6 italic">/ New Deployment (Folder Support)</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold mb-2">Nama Subdomain</label>
                    <div class="flex items-center">
                        <input type="text" id="subdomain" class="w-full bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-slate-600 p-3 rounded-l-xl outline-none" placeholder="my-web">
                        <span class="bg-slate-100 dark:bg-slate-700 border border-l-0 border-slate-200 dark:border-slate-600 p-3 rounded-r-xl font-bold">.xdn.web.id</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Pilih Folder Project</label>
                    <div class="border-2 border-dashed border-slate-200 dark:border-slate-600 rounded-xl p-10 text-center relative hover:border-primary transition">
                        <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" webkitdirectory directory multiple>
                        <p id="file-name" class="text-sm font-medium text-slate-500">Klik di sini untuk pilih folder</p>
                        <p id="file-count" class="text-xs mt-2 font-bold text-primary"></p>
                    </div>
                    <p class="text-[10px] mt-2 text-slate-400">*Wajib ada file index.html di dalam folder.</p>
                </div>

                <button onclick="startDeploy()" id="deployBtn" class="w-full py-4 bg-primary text-white rounded-xl font-bold">Luncurkan Website</button>
            </div>
        </div>

        <div id="log-box" class="mt-6 bg-black text-green-400 p-4 rounded-xl font-mono text-xs h-40 overflow-y-auto">
            > Ready to deploy...
        </div>
    </main>

    <script>
        // ISI CONFIG FIREBASE KAMU DI SINI
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Tampilkan jumlah file saat dipilih
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                const folderName = files[0].webkitRelativePath.split('/')[0];
                document.getElementById('file-name').innerText = "Folder: " + folderName;
                document.getElementById('file-count').innerText = `${files.length} file terdeteksi.`;
            }
        });

        function addLog(msg, color = 'text-green-400') {
            const box = document.getElementById('log-box');
            box.innerHTML += `<div class="${color}">> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function startDeploy() {
            const sub = document.getElementById('subdomain').value.toLowerCase().replace(/[^a-z0-9-]/g, '');
            const files = document.getElementById('fileInput').files;
            const btn = document.getElementById('deployBtn');

            if (!sub || files.length === 0) return alert("Data belum lengkap!");

            // Validasi keberadaan index.html
            const hasIndex = Array.from(files).some(f => f.name === 'index.html');
            if (!hasIndex) return alert("Folder harus punya index.html!");

            btn.disabled = true;
            btn.innerText = "Mengirim Folder...";

            let uploaded = 0;

            for (let file of files) {
                // Ambil path relatif (misal: "css/style.css")
                const pathParts = file.webkitRelativePath.split('/');
                pathParts.shift(); // Buang nama folder utama
                const relativePath = pathParts.join('/');

                if (!relativePath) continue;

                try {
                    const base64 = await toBase64(file);
                    addLog(`Uploading: ${relativePath}...`);

                    const res = await fetch('/api/deploy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sub: sub,
                            path: relativePath,
                            content: base64,
                            email: auth.currentUser?.email || "guest"
                        })
                    });

                    if (res.ok) uploaded++;
                } catch (err) {
                    addLog(`Error pada file: ${relativePath}`, 'text-red-500');
                }
            }

            if (uploaded > 0) {
                await db.ref('deployments/' + sub).set({
                    owner: auth.currentUser?.email || "guest",
                    at: firebase.database.ServerValue.TIMESTAMP
                });
                addLog(`SELESAI! ${uploaded} file berhasil dikirim.`, 'text-blue-400');
                alert("Sukses! Tunggu 1 menit agar Vercel sinkron.");
            }

            btn.disabled = false;
            btn.innerText = "Luncurkan Website";
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
