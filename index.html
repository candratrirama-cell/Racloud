<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XND Free Deploy | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen">

    <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-darkCard sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg">X</div>
                <span class="font-extrabold text-xl tracking-tight uppercase">XND <span class="text-primary">DEPLOY</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-xl">🌓</button>
                <div id="user-nav" class="hidden items-center gap-3 border-l pl-4 border-slate-200 dark:border-slate-700">
                    <img id="user-photo" src="" class="w-8 h-8 rounded-full border-2 border-primary">
                    <button onclick="logout()" class="text-xs font-bold text-red-500 bg-red-50 dark:bg-red-900/20 px-3 py-1.5 rounded-lg hover:bg-red-100 transition">LOGOUT</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="login-screen" class="flex flex-col items-center justify-center py-24 px-4">
        <div class="bg-white dark:bg-darkCard p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border border-slate-100 dark:border-slate-800">
            <h1 class="text-3xl font-extrabold mb-3">Selamat Datang</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">Masuk dengan Google untuk mulai deploy.</p>
            <button onclick="login()" class="w-full py-4 px-6 bg-slate-900 dark:bg-primary text-white rounded-2xl font-bold flex items-center justify-center gap-3 hover:scale-[1.02] transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6">
                Masuk dengan Google
            </button>
        </div>
    </div>

    <main id="dashboard" class="hidden max-w-6xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white dark:bg-darkCard p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                <h2 class="text-2xl font-extrabold mb-8 flex items-center gap-3">
                    <span class="w-2 h-8 bg-primary rounded-full"></span>
                    Create Project
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold mb-3 text-slate-600 dark:text-slate-400 uppercase">Subdomain Name</label>
                        <div class="flex items-center">
                            <input type="text" id="subdomain" class="w-full bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-slate-700 p-4 rounded-l-2xl outline-none focus:ring-2 focus:ring-primary transition" placeholder="project-kamu">
                            <span class="bg-slate-100 dark:bg-slate-800 border border-l-0 border-slate-200 dark:border-slate-700 p-4 rounded-r-2xl font-black text-slate-500">.xdn.web.id</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-3 text-slate-600 dark:text-slate-400 uppercase">Project Folder</label>
                        <div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-10 text-center relative hover:border-primary group transition-all">
                            <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" webkitdirectory directory multiple>
                            <div class="space-y-3">
                                <p id="file-name" class="font-bold text-slate-600 dark:text-slate-300">Klik & Pilih Folder Project</p>
                                <p id="file-count" class="text-xs font-semibold text-primary"></p>
                            </div>
                        </div>
                    </div>

                    <button onclick="startDeploy()" id="deployBtn" class="w-full py-5 bg-primary text-white rounded-2xl font-black text-xl shadow-xl shadow-blue-500/20 hover:scale-[1.01] transition active:scale-[0.99]">
                        START DEPLOYMENT
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white dark:bg-darkCard p-6 rounded-3xl border border-slate-100 dark:border-slate-800">
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4 italic">/ Activity Log</h3>
                <div id="log-box" class="bg-slate-900 text-green-400 p-4 rounded-2xl font-mono text-[10px] h-48 overflow-y-auto border-2 border-slate-800">
                    <div class="opacity-50">> System ready...</div>
                </div>
            </div>

            <div class="bg-white dark:bg-darkCard p-6 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm">
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4 uppercase">My Sites</h3>
                <div id="project-list" class="space-y-3">
                    <p class="text-sm italic text-slate-400">Belum ada situs.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-KEBRl2J7er_9mgGrXTYYL4MR3fkYTuk",
            authDomain: "my-apibase.firebaseapp.com",
            projectId: "my-apibase",
            appId: "1:57472085982:web:40390e5605f296e02ef74f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function addLog(msg, color = 'text-green-400') {
            const box = document.getElementById('log-box');
            box.innerHTML += `<div class="${color}">> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // Auth Logic
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const loginScreen = document.getElementById('login-screen');
            const dashboard = document.getElementById('dashboard');
            const userNav = document.getElementById('user-nav');

            if (user) {
                loginScreen.classList.add('hidden');
                dashboard.classList.remove('hidden');
                userNav.classList.remove('hidden');
                userNav.classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                loadUserProjects();
                addLog(`Logged in as ${user.email}`, 'text-blue-400');
            } else {
                loginScreen.classList.remove('hidden');
                dashboard.classList.add('hidden');
                userNav.classList.add('hidden');
            }
        });

        // File Handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                const folderName = files[0].webkitRelativePath.split('/')[0];
                document.getElementById('file-name').innerText = folderName;
                document.getElementById('file-count').innerText = `${files.length} file terpilih`;
            }
        });

        // Deploy Logic
        async function startDeploy() {
            const sub = document.getElementById('subdomain').value.toLowerCase().replace(/[^a-z0-9-]/g, '');
            const files = document.getElementById('fileInput').files;
            const btn = document.getElementById('deployBtn');

            if (!sub || files.length === 0) return alert("Isi subdomain dan pilih folder!");

            // Validasi index.html
            const hasIndex = Array.from(files).some(f => f.webkitRelativePath.endsWith('/index.html') || f.name === 'index.html');
            if (!hasIndex) return alert("Folder wajib berisi index.html!");

            btn.disabled = true;
            btn.innerText = "CHECKING...";

            try {
                // Cek kepemilikan
                const snap = await db.ref('deployments/' + sub).once('value');
                if (snap.exists() && snap.val().owner !== auth.currentUser.email) {
                    alert("Subdomain sudah diambil orang lain!");
                    throw new Error("Ownership conflict");
                }

                btn.innerText = "DEPLOYING...";
                let uploaded = 0;

                for (let file of files) {
                    const parts = file.webkitRelativePath.split('/');
                    parts.shift(); // Buang folder root
                    const relativePath = parts.join('/');
                    if (!relativePath) continue;

                    const base64 = await toBase64(file);
                    addLog(`Uploading: ${relativePath}...`);

                    const res = await fetch('/api/deploy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sub: sub,
                            path: relativePath,
                            content: base64,
                            email: auth.currentUser.email
                        })
                    });
                    if (res.ok) uploaded++;
                }

                if (uploaded > 0) {
                    await db.ref('deployments/' + sub).set({
                        owner: auth.currentUser.email,
                        at: firebase.database.ServerValue.TIMESTAMP
                    });
                    addLog(`SUCCESS: ${uploaded} files live!`, 'text-blue-400');
                    alert("Deployment Berhasil!");
                    loadUserProjects();
                }

            } catch (err) {
                addLog(`ERROR: ${err.message}`, 'text-red-500');
            } finally {
                btn.disabled = false;
                btn.innerText = "START DEPLOYMENT";
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        async function loadUserProjects() {
            const list = document.getElementById('project-list');
            const snap = await db.ref('deployments').once('value');
            list.innerHTML = '';
            let count = 0;

            snap.forEach(child => {
                if (child.val().owner === auth.currentUser.email) {
                    count++;
                    const name = child.key;
                    list.innerHTML += `
                        <div class="p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center">
                            <span class="font-bold text-sm truncate">${name}.xdn.web.id</span>
                            <a href="https://${name}.xdn.web.id" target="_blank" class="text-primary font-bold text-xs uppercase">Open</a>
                        </div>`;
                }
            });
            if (count === 0) list.innerHTML = '<p class="text-sm italic text-slate-400">Belum ada situs.</p>';
        }
    </script>
</body>
</html>
