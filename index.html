<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Cuan - GoR 1.1</title>
    <style>
        body {
            background-color: #ffde03; /* Kuning Neon */
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background: #ffffff;
            border: 5px solid #000;
            box-shadow: 12px 12px 0px #000;
            padding: 20px;
            width: 320px;
            text-align: center;
        }
        .header {
            background: #00e5ff;
            border: 4px solid #000;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px #000;
        }
        .stats-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .stat-item {
            border: 3px solid #000;
            padding: 5px 10px;
            background: #ff76f6;
            box-shadow: 3px 3px 0px #000;
        }
        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            background: #000;
            padding: 8px;
        }
        .tile {
            aspect-ratio: 1;
            background: #fff;
            border: 3px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .tile:hover { background: #00ff9d; }
        .tile.empty { background: #000; cursor: default; border: none; }
        
        button {
            width: 100%;
            padding: 15px;
            font-family: 'Arial Black', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 5px 5px 0px #000;
            margin-top: 10px;
        }
        .btn-claim { background: #00ff9d; }
        .btn-wd { background: #ff5252; color: white; }
        button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #000; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">PUZZLE CUAN</div>
    
    <div class="stats-box">
        <div class="stat-item">Saldo: Rp<span id="balance">0.0</span></div>
        <div class="stat-item">Admin: 1K</div>
    </div>

    <div id="puzzle-grid"></div>

    <button class="btn-claim" onclick="openSmartlink()">Klaim Reward (Iklan)</button>
    <button class="btn-wd" onclick="withdraw()">Tarik Saldo</button>
</div>

<script>
    const SMARTLINK_URL = "https://www.highrevenuegate.com/29073622"; // URL Smartlink kamu
    let balance = 0.0;
    let tiles = [1, 2, 3, 4, 5, 6, 7, 8, null];

    function renderPuzzle() {
        const grid = document.getElementById('puzzle-grid');
        grid.innerHTML = '';
        tiles.forEach((tile, index) => {
            const div = document.createElement('div');
            div.className = tile === null ? 'tile empty' : 'tile';
            div.innerText = tile || '';
            div.onclick = () => moveTile(index);
            grid.appendChild(div);
        });
    }

    function moveTile(index) {
        const emptyIndex = tiles.indexOf(null);
        const validMoves = [index-1, index+1, index-3, index+3];
        if (validMoves.includes(emptyIndex)) {
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            renderPuzzle();
            checkWin();
        }
    }

    function checkWin() {
        if (tiles.slice(0, 8).every((t, i) => t === i + 1)) {
            alert("Puzzle Selesai! Klik tombol klaim untuk ambil rupiah.");
        }
    }

    function openSmartlink() {
        // Logika Gacha: 98% (0.1 - 1), 2% (1.1 - 5)
        let chance = Math.random() * 100;
        let reward = chance <= 98 ? (Math.random() * 0.9 + 0.1) : (Math.random() * 3.9 + 1.1);
        
        balance += reward;
        document.getElementById('balance').innerText = balance.toFixed(1);
        
        // Buka Smartlink di tab baru
        window.open(SMARTLINK_URL, '_blank');
        
        // Acak ulang puzzle
        tiles.sort(() => Math.random() - 0.5);
        renderPuzzle();
    }

    function withdraw() {
        if (balance >= 11000) {
            alert("Permintaan WD Berhasil! Admin akan memproses dalam 24 jam.");
            window.open(SMARTLINK_URL, '_blank');
        } else {
            alert("Minimal saldo 10.000 + Biaya Admin 1.000 (Total 11.000)");
        }
    }

    renderPuzzle();
</script>

</body>
</html>
